<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JIALONG CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit;outline:none}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1a3a5c);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:20px;padding:40px;width:360px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.35)}
.login-logo{font-size:36px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;color:#0f172a;margin-bottom:4px}
.login-sub{font-size:13px;color:#94a3b8;margin-bottom:28px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.user-btn{padding:13px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:14px;font-weight:600;color:#374151;transition:all .15s}
.user-btn:hover{border-color:#3b82f6;color:#2563eb;background:#eff6ff}
.user-btn.admin{background:#0f172a;color:#fff;border-color:#0f172a;grid-column:span 2;margin-top:4px}
.nav{background:#0f172a;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:2px;overflow:hidden}
.nav-brand{color:#fff;font-weight:700;font-size:15px;margin-right:12px;white-space:nowrap;flex-shrink:0}
.nb{background:none;border:none;color:#94a3b8;font-size:13px;padding:6px 10px;border-radius:6px;white-space:nowrap;transition:color .15s}
.nb:hover{color:#e2e8f0}.nb.active{color:#38bdf8;background:rgba(255,255,255,.08)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-pill{font-size:12px;color:#94a3b8;background:#1e293b;padding:4px 10px;border-radius:20px}
.user-pill b{color:#38bdf8}
.btn-p{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600}
.btn-p:hover{background:#2563eb}
.btn-s{background:#1e293b;color:#94a3b8;border:none;border-radius:8px;padding:7px 13px;font-size:13px}
.btn-s:hover{background:#334155;color:#e2e8f0}
.main{max-width:1200px;margin:0 auto;padding:18px 14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #e2e8f0;cursor:pointer}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stat-lbl{font-size:11px;color:#94a3b8;margin-bottom:5px;font-weight:500;letter-spacing:.5px}
.stat-v{font-size:26px;font-weight:700}
.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.chart-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:14px;cursor:pointer;transition:box-shadow .15s}
.chart-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.chart-card.no-click{cursor:default}.chart-card.no-click:hover{box-shadow:none}
.chart-ttl{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:170px}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#f8fafc;border-bottom:1px solid #f1f5f9}
.filter-bar input,.filter-bar select{padding:7px 10px;border-radius:7px;border:1px solid #e2e8f0;font-size:12px;background:#fff;color:#374151}
.filter-bar input{min-width:150px}
.tw{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
.th{padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ttl{font-weight:700;font-size:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 11px;text-align:left;color:#64748b;font-weight:700;font-size:11px;border-bottom:1px solid #e2e8f0;background:#f8fafc;white-space:nowrap;letter-spacing:.4px}
td{padding:8px 11px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.nlink{color:#1d4ed8;font-weight:700;cursor:pointer}.nlink:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap}
.s-潜在{background:#eff6ff;color:#3b82f6}.s-意向{background:#fffbeb;color:#d97706}
.s-成交{background:#f0fdf4;color:#16a34a}.s-流失{background:#f9fafb;color:#94a3b8}
.s-垃圾{background:#fff1f2;color:#f43f5e}.s-{background:#f8fafc;color:#94a3b8}
.u-red{background:#fef2f2;color:#ef4444}
.dup-w{background:#fff7ed;color:#c2410c;font-size:10px;padding:1px 5px;border-radius:4px;margin-left:3px}
.acts{display:flex;gap:3px;flex-wrap:nowrap}
.ab{font-size:11px;padding:3px 7px;border-radius:5px;border:1px solid;white-space:nowrap}
.ag{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.ab2{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.ac{background:#f8fafc;color:#4b5563;border-color:#e5e7eb}
.ao{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.ar{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:580px;margin:auto;flex-shrink:0}
.mlg{max-width:700px}.msm{max-width:460px}
.mh{padding:15px 20px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0}
.mt{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.xb{background:none;border:none;font-size:22px;color:#94a3b8;line-height:1;padding:2px;flex-shrink:0}
.mb{padding:16px 20px;max-height:75vh;overflow-y:auto}
.mf{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid #f1f5f9}
.fg{margin-bottom:13px}
.fl{font-size:12px;color:#4b5563;display:block;margin-bottom:3px;font-weight:600}
.fi{width:100%;padding:8px 11px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;background:#fff;color:#1e293b}
.fi:focus{border-color:#93c5fd}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.stitle{font-size:11px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin:15px 0 9px;padding-bottom:5px;border-bottom:1px solid #f1f5f9}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:500;transition:all .15s}
.toff{border:1px solid #e2e8f0;background:#fff;color:#6b7280}
.ton{border:1px solid #3b82f6;background:#eff6ff;color:#1d4ed8}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.di{padding:8px 10px;background:#f8fafc;border-radius:8px}
.dk{font-size:11px;color:#94a3b8;margin-bottom:2px}
.dv{font-size:13px;color:#1e293b;font-weight:500;word-break:break-all}
.task-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:13px 16px;margin-bottom:10px}
.task-top{display:flex;gap:11px;align-items:flex-start}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-meta{font-size:11px;color:#94a3b8;margin-bottom:5px}
.task-note{font-size:12px;background:#f8fafc;border-left:3px solid #e2e8f0;padding:5px 9px;border-radius:0 6px 6px 0;color:#475569}
.tbs{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.tb{padding:6px 11px;border-radius:8px;font-size:12px;font-weight:600;border:none;white-space:nowrap}
.tbg{background:#10b981;color:#fff}
.tbb{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe!important}
.tbc{background:#f8fafc;color:#4b5563;border:1px solid #e5e7eb!important}
.sea-card{background:#fff;border-radius:12px;border:1px solid #fca5a5;padding:11px 15px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.ll{background:#f8fafc;border-radius:8px;padding:8px 11px;max-height:150px;overflow-y:auto}
.li{font-size:12px;color:#475569;padding:4px 0;border-bottom:1px dashed #e2e8f0}
.li:last-child{border-bottom:none}
.ld{color:#94a3b8}
.sdots{display:flex;gap:3px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#e2e8f0;flex-shrink:0}
.dot.done{background:#10b981}.dot.cur{background:#f59e0b}
.nf-pend{color:#94a3b8;font-size:12px}.nf-soon{color:#d97706;font-size:12px;font-weight:600}
.nf-today{color:#ef4444;font-size:12px;font-weight:700}.nf-over{color:#dc2626;font-size:12px;font-weight:700}
.nf-done{color:#16a34a;font-size:12px}
.perf-row{padding:9px 14px;border-bottom:1px solid #f8fafc}
.perf-row:last-child{border-bottom:none}
.perf-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.perf-bar{height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.perf-fill{height:100%;background:#10b981;border-radius:2px;transition:width .5s}
.imp-tpl{font-family:monospace;font-size:11px;background:#f8fafc;padding:10px 12px;border-radius:8px;overflow-x:auto;white-space:pre;color:#374151;margin-bottom:10px;border:1px solid #e2e8f0}
.empty{padding:40px;text-align:center;color:#94a3b8}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-ttl{font-size:15px;font-weight:700;color:#374151;margin-bottom:4px}
#toast{position:fixed;bottom:18px;right:18px;background:#0f172a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
.drill-row{padding:9px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.drill-row:hover{background:#f8fafc}.drill-row:last-child{border-bottom:none}
.dash-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.df-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;transition:all .15s}
.df-btn.on{border-color:#3b82f6;background:#eff6ff;color:#2563eb}
@media(max-width:768px){
  .chart-grid{grid-template-columns:1fr}
  .dash-row,.g2,.g3,.det-grid{grid-template-columns:1fr}
  th,td{padding:7px 8px}
  .nav-brand{font-size:13px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏭</div>
    <div class="login-title">嘉龙包装 CRM</div>
    <div class="login-sub">选择你的身份开始使用</div>
    <div class="user-grid">
      <button class="user-btn" onclick="login('Jacky')">Jacky</button>
      <button class="user-btn" onclick="login('Jen')">Jen</button>
      <button class="user-btn" onclick="login('Jimmy')">Jimmy</button>
      <button class="user-btn" onclick="login('Chris')">Chris</button>
      <button class="user-btn" onclick="login('Tony')">Tony</button>
      <button class="user-btn" onclick="login('Gethin')">Gethin</button>
    </div>
    <button class="user-btn admin" onclick="login('管理员')">🔧 管理员（查看全部数据）</button>
  </div>
</div>

<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-left">
      <span class="nav-brand">JIALONG CRM</span>
      <button class="nb active" id="nb-dashboard" onclick="setView('dashboard')">📊 看板</button>
      <button class="nb" id="nb-customers" onclick="setView('customers')">👥 客户</button>
      <button class="nb" id="nb-tasks" onclick="setView('tasks')">🔴 待办</button>
      <button class="nb" id="nb-sea" onclick="setView('sea')">🌊 公海</button>
    </div>
    <div class="nav-right">
      <button class="btn-s" onclick="openImport()">📥 导入</button>
      <button class="btn-p" onclick="openAdd()">+ 新建</button>
      <div class="user-pill">当前：<b id="uname"></b></div>
      <button class="btn-s" style="padding:5px 9px;font-size:12px" onclick="logout()">切换</button>
    </div>
  </nav>
  <div class="main" id="main"></div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://otfqrrjwfxwiqanflocy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-dUNxzzwwKbksz8BF41Mlw_mZJh8HLY';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const SALES=['Jacky','Jen','Jimmy','Chris','Tony','Gethin'];
const PASSWORDS={
  'Jacky':'jacky123',
  'Jen':'jen123',
  'Jimmy':'jimmy123',
  'Chris':'chris123',
  'Tony':'tony123',
  'Gethin':'gethin123',
  '管理员':'admin888'
};
const SOURCES=['易询盘','外贸牛','阿里巴巴','中国制造','社媒','国内转交'];
const PRODUCTS=['真空机','封口机','半自动','外购产品'];
const STATUSES=['','潜在','意向','成交','流失','垃圾'];
const CTYPES=['终端客户','经销商','代理商','其他'];
const VACUUM=['有','无','待确认'];
const AUTO=['全自动','半自动','手动','待确认'];
const SLABELS=['','首次跟进','3天回访','7天回访','15天回访','30天回访'];
const COLORS=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#f97316','#06b6d4','#84cc16','#ec4899','#94a3b8','#f43f5e','#14b8a6'];

let CU=null,ALL=[],CUS=[],LOGS=[];
let VIEW='dashboard',DF='全部';
let fS='',fSales='全部',fStat='全部',fCo='全部',fSrc='全部';
let EID=null,LID=null,FD={},LFD={};
let CI={};

const T=()=>new Date().toISOString().split('T')[0];
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().split('T')[0]};
const diffD=d=>d?Math.floor((new Date(d)-new Date(T()))/86400000):null;
const fmt=d=>d?new Date(d).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}):'—';
const fmtF=d=>d?new Date(d).toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'}):'—';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isAdm=()=>CU==='管理员';

function toast(m,t=2500){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),t)}

function isSea(c){
  if(['成交','流失','垃圾'].includes(c.status))return false;
  const r=c.last_follow_date||c.first_follow_date||c.created_at?.split('T')[0];
  if(!r)return false;
  return addD(r,30)<T();
}

function isTask(c){
  if(['成交','流失','垃圾'].includes(c.status))return false;
  if((c.follow_stage||0)>=5)return false;
  if((c.follow_stage||0)===0)return true;
  return c.next_follow_date&&c.next_follow_date<=T();
}

function nfi(c){
  const s=c.follow_stage||0;
  if(s>=5)return{t:'✅ 完成',cls:'nf-done'};
  if(s===0)return{t:'待首次跟进',cls:'nf-pend'};
  const d=diffD(c.next_follow_date);
  if(d===null)return{t:'—',cls:'nf-pend'};
  if(d<0)return{t:`逾期${-d}天`,cls:'nf-over'};
  if(d===0)return{t:'今天!',cls:'nf-today'};
  if(d<=3)return{t:`${d}天后`,cls:'nf-soon'};
  return{t:fmt(c.next_follow_date),cls:'nf-pend'};
}

function isDup(c,skip=null){
  return ALL.some(x=>x.id!==skip&&((c.name&&x.name===c.name)||(c.phone&&c.phone.length>5&&x.phone===c.phone)));
}

async function load(){
  const[cr,lr]=await Promise.all([
    db.from('customers').select('*').order('created_at',{ascending:false}),
    db.from('follow_logs').select('*').order('created_at',{ascending:false})
  ]);
  ALL=cr.data||[];LOGS=lr.data||[];
  applyFilter();render();
}

function applyFilter(){
  if(isAdm())CUS=DF==='全部'?[...ALL]:ALL.filter(c=>c.sales===DF);
  else CUS=ALL.filter(c=>c.sales===CU||isSea(c));
}

async function saveCus(){
  if(!FD.name?.trim()){toast('⚠️ 请填写客户姓名');return;}
  const p={
    name:FD.name.trim(),company:FD.company||'',email:FD.email||'',phone:FD.phone||'',
    source:FD.source||'',country:FD.country||'',region:FD.region||'',products:FD.products||[],
    packaging_material:FD.packaging_material||'',packaging_weight:FD.packaging_weight||'',
    packaging_speed:FD.packaging_speed||'',vacuum_need:FD.vacuum_need||'',
    automation_need:FD.automation_need||'',customer_type:FD.customer_type||'',
    self_type:FD.self_type||'',purchase_timeline:FD.purchase_timeline||'',
    project_details:FD.project_details||'',sales:FD.sales||CU,status:FD.status||'',
    first_record_date:FD.first_record_date||null,notes:FD.notes||''
  };
  if(isDup({name:p.name,phone:p.phone},EID)&&!confirm('检测到重复客户（相同姓名或电话），是否继续？'))return;
  const{error}=EID?await db.from('customers').update(p).eq('id',EID):await db.from('customers').insert([p]);
  if(error){toast('失败:'+error.message);return;}
  toast(EID?'✅ 已更新':'✅ 添加成功');closeM();await load();
}

async function followUp(id){
  const c=ALL.find(x=>x.id===id);if(!c)return;
  const t=T(),ns=Math.min((c.follow_stage||0)+1,5);
  const upd={last_follow_date:t,follow_stage:ns};
  if(ns===1){upd.first_follow_date=t;upd.next_follow_date=addD(t,3);}
  else if(ns===2)upd.next_follow_date=addD(c.first_follow_date,7);
  else if(ns===3)upd.next_follow_date=addD(c.first_follow_date,15);
  else if(ns===4)upd.next_follow_date=addD(c.first_follow_date,30);
  else upd.next_follow_date=null;
  await db.from('customers').update(upd).eq('id',id);
  await db.from('follow_logs').insert([{customer_id:id,sales:CU,stage_label:SLABELS[ns]||'已完成',notes:'标记已跟进',status_update:''}]);
  toast(`✅ ${SLABELS[ns]||'跟进完成'}`);await load();
}

async function claimSea(id){
  const t=T();
  await db.from('customers').update({sales:CU,last_follow_date:t,follow_stage:1,first_follow_date:t,next_follow_date:addD(t,3)}).eq('id',id);
  toast('✅ 已认领，开始跟进');await load();
}

async function transfer(id){
  const tgt=prompt('转移给谁？\n'+SALES.join(' / '));
  if(!tgt||!SALES.includes(tgt)){toast('销售人员不存在');return;}
  await db.from('customers').update({sales:tgt}).eq('id',id);
  toast(`✅ 已转移给 ${tgt}`);await load();
}

async function delCus(id){
  if(!confirm('确定删除？'))return;
  await db.from('customers').delete().eq('id',id);
  toast('已删除');await load();
}

async function saveLog(){
  if(!LFD.notes?.trim()){toast('请填写沟通详情');return;}
  if(LFD.status_update)await db.from('customers').update({status:LFD.status_update}).eq('id',LID);
  await db.from('follow_logs').insert([{customer_id:LID,sales:CU,stage_label:LFD.stage_label||'',notes:LFD.notes.trim(),status_update:LFD.status_update||''}]);
  toast('📝 日志已保存');LFD={stage_label:'',notes:'',status_update:''};
  await load();renderLogM(LID);
}

function login(n){
  const pwd=prompt(`请输入 ${n} 的登录密码：`);
  if(pwd===null)return;
  if(pwd!==PASSWORDS[n]){toast('❌ 密码错误');return;}
  CU=n;localStorage.setItem('crm_u',n);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uname').textContent=n;
  load();
}
function logout(){
  localStorage.removeItem('crm_u');CU=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

function setView(v){
  VIEW=v;
  ['dashboard','customers','tasks','sea'].forEach(k=>{
    const b=document.getElementById('nb-'+k);
    if(b)b.classList.toggle('active',k===v);
  });
  render();
}

function render(){
  applyFilter();
  const el=document.getElementById('main');if(!el)return;
  if(VIEW==='dashboard')el.innerHTML=renderDash();
  else if(VIEW==='customers')el.innerHTML=renderCus();
  else if(VIEW==='tasks')el.innerHTML=renderTasks();
  else if(VIEW==='sea')el.innerHTML=renderSea();
  if(VIEW==='dashboard')setTimeout(renderCharts,60);
  updateBadge();
}

function updateBadge(){
  const n=ALL.filter(c=>isTask(c)&&(isAdm()||c.sales===CU)).length;

  if(b)b.textContent=`${n?'🔴':'⬜'} 待办${n?` (${n})`:''}`;
}

function renderTodMini(list){
  if(!list.length)return'<div class="empty" style="padding:20px;font-size:13px">今天暂无待办 🎉</div>';
  return list.map(c=>{const n=nfi(c);return`
    <div style="padding:8px 13px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:8px">
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.name)}</div>
      <div style="font-size:11px;color:#94a3b8">${esc(c.sales)} · ${esc(c.country)}</div></div>
      <span class="${n.cls}">${n.t}</span>
      <button class="ab ag" onclick="followUp('${c.id}')">✓跟进</button>
    </div>`}).join('');
}

function renderPerf(src){
  const rows=SALES.map(s=>{
    const own=src.filter(c=>c.sales===s);
    const won=own.filter(c=>c.status==='成交').length;
    const tot=own.length;
    return{s,won,tot,p:tot?Math.round(won/tot*100):0};
  }).filter(x=>x.tot>0);
  if(!rows.length)return'<div class="empty" style="padding:16px;font-size:13px">暂无数据</div>';
  return rows.map(({s,won,tot,p})=>`<div class="perf-row">
    <div class="perf-top"><span style="font-weight:500">${s}</span><span style="color:#64748b;font-size:12px">${won}/${tot} 成交·${p}%</span></div>
    <div class="perf-bar"><div class="perf-fill" style="width:${p}%"></div></div>
  </div>`).join('');
}

function renderCharts(){
  const src=isAdm()&&DF==='全部'?ALL:CUS;
  Object.values(CI).forEach(c=>{try{c.destroy()}catch(e){}});CI={};
  const pie=(id,data,onClick)=>{
    const labels=Object.keys(data).filter(k=>k&&data[k]>0);
    const vals=labels.map(k=>data[k]);
    if(!labels.length)return;
    const ctx=document.getElementById(id);if(!ctx)return;
    CI[id]=new Chart(ctx,{type:'pie',
      data:{labels,datasets:[{data:vals,backgroundColor:COLORS.slice(0,labels.length),borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:10},padding:6}}},
        onClick:(_,el)=>{if(onClick&&el.length)onClick(labels[el[0].index]);}}});
  };
  const agg=field=>{const m={};src.forEach(c=>{const v=c[field]||'';m[v]=(m[v]||0)+1});return m;};
  pie('cc',agg('country'),l=>showDrill('country',l));
  const sd={};src.forEach(c=>{const v=c.status||'未设置';sd[v]=(sd[v]||0)+1});
  pie('cs',sd,l=>showDrill('status',l==='未设置'?'':l));
  pie('cm',agg('packaging_material'),l=>showDrill('packaging_material',l));
  const ctx2=document.getElementById('cv');
  if(ctx2)CI['cv']=new Chart(ctx2,{type:'bar',
    data:{labels:SALES,datasets:[{data:SALES.map(s=>src.filter(c=>c.sales===s).length),backgroundColor:'#3b82f6',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},
      onClick:(_,el)=>{if(el.length)showDrill('sales',SALES[el[0].index]);}}});
  const days=Array.from({length:14},(_,i)=>addD(T(),i-13));
  const ctx3=document.getElementById('cd');
  if(ctx3)CI['cd']=new Chart(ctx3,{type:'bar',
    data:{labels:days.map(d=>fmt(d)),datasets:[{data:days.map(d=>src.filter(c=>c.created_at?.startsWith(d)).length),backgroundColor:'#10b981',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},
      onClick:(_,el)=>{if(el.length)showDrill('date',days[el[0].index]);}}});
}

function statClick(type,val){
  if(type==='tasks'){setView('tasks');return;}
  if(type==='sea'){setView('sea');return;}
  if(type==='all'){showDrill('all',null);return;}
  showDrill('status',val);
}

function showDrill(field,value,e){
  if(e&&e.target.tagName==='CANVAS')return;
  const src=isAdm()&&DF==='全部'?ALL:CUS;
  const list=field==='all'?src
    :field==='date'?src.filter(c=>c.created_at?.startsWith(value))
    :value!==undefined?src.filter(c=>(c[field]||'')===(value||''))
    :src;
  const labels={country:'国家',status:'状态',packaging_material:'包装物料',sales:'销售',date:'日期',all:'全部客户'};
  const el=document.createElement('div');el.className='overlay';el.id='drill-ov';
  const rows=list.length===0?'<div class="empty">暂无数据</div>':list.map(c=>{
    const n=nfi(c);const cl=LOGS.filter(l=>l.customer_id===c.id)[0];
    return`<div class="drill-row">
      <div style="flex:1;min-width:0">
        <div class="nlink" style="font-size:13px" onclick="openDetail('${c.id}')">${esc(c.name)}</div>
        <div style="font-size:11px;color:#94a3b8">${esc(c.company)} · ${esc(c.sales)}</div>
      </div>
      <div style="min-width:60px"><span class="badge s-${c.status||''}">${c.status||'未设置'}</span></div>
      <div style="min-width:90px;font-size:12px;color:#2563eb;cursor:pointer" onclick="openLog('${c.id}')">${cl?esc(cl.notes.substring(0,18))+'…':'暂无日志'}</div>
    </div>`;}).join('');
  el.innerHTML=`<div class="modal mlg">
    <div class="mh">
      <div class="mt">${labels[field]||field}：${esc(value||'全部')} <span style="font-size:13px;color:#94a3b8;font-weight:400">${list.length}个客户</span></div>
      <button class="xb" onclick="document.getElementById('drill-ov').remove()">×</button>

    <div style="padding:0 0 8px">
      <div style="padding:7px 14px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 70px 100px;font-size:11px;font-weight:700;color:#64748b;letter-spacing:.5px">
        <span>客户名称</span><span>状态</span><span>最近跟进</span>
      </div>
      <div style="max-height:55vh;overflow-y:auto">${rows}</div>
    </div>
  </div>`;
  document.body.appendChild(el);el.addEventListener('click',ev=>{if(ev.target===el)el.remove()});

      <td style="color:#64748b">${esc(c.source)||'—'}</td>

      <td style="color:#374151;font-weight:500">${esc(c.sales)||'—'}</td>
      <td><span class="badge s-${c.status||''}">${c.status||'未设置'}</span></td>
      <td style="color:#64748b;white-space:nowrap">${fmt(c.last_follow_date)}</td>
      <td><span class="${n.cls}">${n.t}</span><br>${dots}</td>

    </tr>`;}).join('');
  return`<div class="tw">

    <div class="filter-bar">

      ${isAdm()?`<select onchange="fSales=this.value;render()">${saOpts.map(s=>`<option ${fSales===s?'selected':''}>${s}</option>`).join('')}</select>`:''}
      <select onchange="fStat=this.value;render()">

function tP(p){
  if(FD.products.includes(p))FD.products=FD.products.filter(x=>x!==p);
  else FD.products.push(p);
  document.getElementById('ptags').innerHTML=PRODUCTS.map(pp=>`<button type="button" class="tag ${FD.products.includes(pp)?'ton':'toff'}" onclick="tP('${pp}')">${pp}</button>`).join('');
}

  el.innerHTML=`<div class="modal mlg">

function loadFile(inp){
  const f=inp.files[0];if(!f)return;
  document.getElementById('fn').textContent=f.name;
  const r=new FileReader();r.onload=e=>{document.getElementById('imp-txt').value=e.target.result};r.readAsText(f,'UTF-8');
}

async function doImp(){
  const raw=document.getElementById('imp-txt')?.value?.trim();
  if(!raw){toast('请粘贴 CSV 数据');return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){toast('至少需要表头+一行数据');return;}
  const parse=l=>l.split(',').map(s=>s.trim());
  const headers=parse(lines[0]);
  const map={
    姓名:'name',公司:'company',邮箱:'email',电话:'phone',来源:'source',国家:'country',
    地区:'region',负责销售:'sales',状态:'status',包装物料:'packaging_material',
    包装重量:'packaging_weight',包装速度:'packaging_speed',真空需求:'vacuum_need',
    自动化需求:'automation_need',客户类型:'customer_type',客户性质:'self_type',
    预计购买:'purchase_timeline',项目详情:'project_details',备注:'notes'
  };
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=parse(lines[i]);
    const obj={products:[]};
    headers.forEach((h,j)=>{if(map[h])obj[map[h]]=vals[j]||''});
    if(!obj.name)continue;
    if(!obj.sales)obj.sales=CU;
    rows.push(obj);
  }
  if(!rows.length){toast('没有有效数据行');return;}
  const{error}=await db.from('customers').insert(rows);
  if(error){toast('导入失败: '+error.message);return;}
  toast(`✅ 成功导入 ${rows.length} 条`);
  document.getElementById('imp-ov')?.remove();
  await load();
}

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uname').textContent=saved;
  load();
}

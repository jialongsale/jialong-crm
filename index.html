<style>

body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

.imp-tpl{font-family:monospace;font-size:11px;background:#f8fafc;padding:10px 12px;border-radius:8px;overflow-x:auto;white-space:pre;color:#374151;margin-bottom:10px;border:1px solid #e2e8f0}

.dash-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}

.date-filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.dfb{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;transition:all .15s}
.dfb.on{border-color:#3b82f6;background:#eff6ff;color:#2563eb}
.custom-date-row{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
.custom-date-row input{padding:5px 9px;border-radius:7px;border:1px solid #e2e8f0;font-size:12px;background:#fff}
.custom-date-row button{padding:5px 12px;border-radius:7px;border:none;background:#3b82f6;color:#fff;font-size:12px;cursor:pointer}
.page-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #f1f5f9;flex-wrap:wrap}
.page-btn{padding:5px 11px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;font-size:12px;color:#374151;cursor:pointer}
.page-btn:hover{background:#f8fafc}

@media(max-width:768px){
  .stat-grid{grid-template-columns:repeat(3,1fr)}

}
</style>

<script>
const SUPABASE_URL = 'https://otfqrrjwfxwiqanflocy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-dUNxzzwwKbksz8BF41Mlw_mZJh8HLY';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const SALES=['Jacky','Jen','Jimmy','Chris','Tony','Gethin'];
const SOURCES=['易询盘','外贸牛','阿里巴巴','中国制造','社媒','国内转交'];
const PRODUCTS=['真空机','封口机','半自动','全自动','外购产品'];
const STATUSES=['','潜在','意向','成交','转交代理商','流失','垃圾'];
const DONE_STATUSES=['成交','转交代理商','流失','垃圾'];
const CTYPES=['终端客户','经销商','代理商','其他'];
const VACUUM=['有','无','待确认'];
const AUTO=['全自动','半自动','手动','待确认'];
const SLABELS=['','首次跟进','3天回访','7天回访','15天回访','30天回访'];
const COLORS=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#f97316','#06b6d4','#84cc16','#ec4899','#94a3b8','#f43f5e','#14b8a6','#a855f7','#0ea5e9','#d946ef'];
const PASSWORDS={Jacky:'jacky123',Jen:'jen123',Jimmy:'jimmy123',Chris:'chris123',Tony:'tony123',Gethin:'gethin123','管理员':'admin888'};

let CU=null,ALL=[],CUS=[],LOGS=[];
let VIEW='dashboard',DF='全部';
let fS='',fSales='全部',fStat='全部',fCo='全部',fSrc='全部',fCtype='全部',fDup=false;
let fDateRange='all',fDateStart='',fDateEnd='';
let dashDateRange='14',dashDateStart='',dashDateEnd='';
let EID=null,LID=null,FD={},LFD={};
let CI={};
let cusPage=1,cusPageSize=20,selIds=new Set();

const T=()=>new Date().toISOString().split('T')[0];
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().split('T')[0]};
const diffD=d=>d?Math.floor((new Date(d)-new Date(T()))/86400000):null;
const fmt=d=>d?new Date(d).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}):'—';
const fmtF=d=>d?new Date(d).toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'}):'—';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isAdm=()=>CU==='管理员';

function toast(m,t=2500){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),t)}
function cusDate(c){return c.custom_date||c.created_at?.split('T')[0]||''}

function getDateRange(range,start,end){
  const t=T();
  if(range==='7')return{s:addD(t,-6),e:t};
  if(range==='14')return{s:addD(t,-13),e:t};
  if(range==='30')return{s:addD(t,-29),e:t};
  if(range==='month'){const d=new Date();return{s:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`,e:t};}
  if(range==='lastmonth'){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0');const last=new Date(y,d.getMonth()+1,0).getDate();return{s:`${y}-${m}-01`,e:`${y}-${m}-${last}`};}
  if(range==='custom')return{s:start,e:end};
  return null;
}

function filterByDate(list,range,start,end){
  const r=getDateRange(range,start,end);
  if(!r||!r.s)return list;
  return list.filter(c=>{const d=cusDate(c);return d>=r.s&&d<=r.e;});
}

function aggSorted(src,field){
  const m={};
  src.forEach(c=>{const v=c[field]||'';if(v)m[v]=(m[v]||0)+1;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function isSea(c){
  if(DONE_STATUSES.includes(c.status))return false;
  const r=c.last_follow_date||c.first_follow_date||c.created_at?.split('T')[0];
  if(!r)return false;
  return addD(r,30)<T();
}

function isTask(c){
  if(DONE_STATUSES.includes(c.status))return false;
  if((c.follow_stage||0)>=5)return false;
  if((c.follow_stage||0)===0)return true;
  return c.next_follow_date&&c.next_follow_date<=T();
}

function nfi(c){
  const s=c.follow_stage||0;
  if(DONE_STATUSES.includes(c.status))return{t:'✅ 完成',cls:'nf-done'};
  if(s>=5)return{t:'✅ 完成',cls:'nf-done'};
  if(s===0)return{t:'待首次跟进',cls:'nf-pend'};
  const d=diffD(c.next_follow_date);
  if(d===null)return{t:'—',cls:'nf-pend'};
  if(d<0)return{t:`逾期${-d}天`,cls:'nf-over'};
  if(d===0)return{t:'今天!',cls:'nf-today'};
  if(d<=3)return{t:`${d}天后`,cls:'nf-soon'};
  return{t:fmt(c.next_follow_date),cls:'nf-pend'};
}

function isDup(c,skip=null){
  return ALL.some(x=>x.id!==skip&&((c.name&&x.name===c.name)||(c.phone&&c.phone.length>5&&x.phone===c.phone)));
}

async function fetchAll(table,orderCol){
  let all=[],from=0;
  while(true){
    const{data,error}=await db.from(table).select('*').order(orderCol,{ascending:false,nullsFirst:false}).range(from,from+999);
    if(error||!data||data.length===0)break;
    all=[...all,...data];
    if(data.length<1000)break;
    from+=1000;
  }
  return all;
}

async function load(){
  const[cr,lr]=await Promise.all([
    fetchAll('customers','custom_date'),
    fetchAll('follow_logs','created_at')
  ]);
  ALL=cr;LOGS=lr;
  applyFilter();render();
}

  const c=ALL.find(x=>x.id===LID);if(!c)return;

  else if(ns===2)upd.next_follow_date=addD(c.first_follow_date||logDate,7);

async function deleteLog(logId){
  if(!confirm('确定删除这条跟进记录？'))return;
  await db.from('follow_logs').delete().eq('id',logId);
  const remaining=LOGS.filter(l=>l.customer_id===LID&&l.id!==logId);
  const c=ALL.find(x=>x.id===LID);if(c){
    if(remaining.length===0){
      await db.from('customers').update({follow_stage:0,first_follow_date:null,last_follow_date:null,next_follow_date:null}).eq('id',LID);
    } else {
      const sorted=remaining.sort((a,b)=>(b.log_date||b.created_at)>(a.log_date||a.created_at)?1:-1);
      const latest=sorted[0];
      const latestDate=latest.log_date||latest.created_at?.split('T')[0];
      const ns=Math.min(remaining.length,5);
      const first=sorted[sorted.length-1];
      const firstDate=first.log_date||first.created_at?.split('T')[0];
      const nextMap={1:addD(firstDate,3),2:addD(firstDate,7),3:addD(firstDate,15),4:addD(firstDate,30),5:null};
      await db.from('customers').update({follow_stage:ns,first_follow_date:firstDate,last_follow_date:latestDate,next_follow_date:nextMap[ns]||null}).eq('id',LID);
    }
  }
  toast('已删除');await load();renderLogM(LID);
}

function renderPerf(src){
  const rows=SALES.map(s=>{
    const own=src.filter(c=>c.sales===s);
    const won=own.filter(c=>c.status==='成交').length;
    const tot=own.length;
    return{s,won,tot,p:tot?Math.round(won/tot*100):0};
  }).filter(x=>x.tot>0);
  if(!rows.length)return'<div class="empty" style="padding:16px;font-size:13px">暂无数据</div>';
  return rows.map(({s,won,tot,p})=>`<div class="perf-row">
    <div class="perf-top"><span style="font-weight:500">${s}</span><span style="color:#64748b;font-size:12px">${won}/${tot} 成交·${p}%</span></div>
    <div class="perf-bar"><div class="perf-fill" style="width:${p}%"></div></div>
  </div>`).join('');
}

  if(!r||!r.s||!r.e)return Array.from({length:14},(_,i)=>addD(T(),i-13));
  const days=[];let d=r.s;
  while(d<=r.e){days.push(d);d=addD(d,1);}

      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:10},padding:6}}},
        onClick:(_,el)=>{if(onClick&&el.length)onClick(labels[el[0].index]);}}});
  };
  pie('cc',aggSorted(src,'country'),l=>showDrill('country',l));
  pie('cm',aggSorted(src,'packaging_material'),l=>showDrill('packaging_material',l));
  pie('cct',aggSorted(src,'customer_type'),l=>showDrill('customer_type',l));
  pie('csr',aggSorted(src,'source'),l=>showDrill('source',l));
  const sd={};src.forEach(c=>{const v=c.status||'未设置';sd[v]=(sd[v]||0)+1});
  pie('cs',Object.entries(sd).sort((a,b)=>b[1]-a[1]),l=>showDrill('status',l==='未设置'?'':l));
  const ctx2=document.getElementById('cv');
  if(ctx2)CI['cv']=new Chart(ctx2,{type:'bar',
    data:{labels:SALES,datasets:[{data:SALES.map(s=>src.filter(c=>c.sales===s).length),backgroundColor:'#3b82f6',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},
      onClick:(_,el)=>{if(el.length)showDrill('sales',SALES[el[0].index]);}}});
  const days=getDashDays();
  const ctx3=document.getElementById('cd');
  if(ctx3)CI['cd']=new Chart(ctx3,{type:'bar',
    data:{labels:days.map(d=>fmt(d)),datasets:[{data:days.map(d=>src.filter(c=>cusDate(c)===d).length),backgroundColor:'#10b981',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{ticks:{maxRotation:45,font:{size:10}}}},
      onClick:(_,el)=>{if(el.length)showDrill('date',days[el[0].index]);}}});
}

function statClick(type,val){
  if(type==='tasks'){setView('tasks');return;}
  if(type==='sea'){setView('sea');return;}
  if(type==='all'){showDrill('all',null);return;}
  showDrill('status',val);

function showDrill(field,value,e){
  if(e&&e.target.tagName==='CANVAS')return;
  const src=isAdm()&&DF==='全部'?ALL:CUS;
  const list=field==='all'?src
    :field==='date'?src.filter(c=>cusDate(c)===value)
    :value!==undefined?src.filter(c=>(c[field]||'')===(value||''))
    :src;
  const labels={country:'国家',status:'状态',packaging_material:'行业',sales:'销售',date:'日期',all:'全部客户',source:'客户来源',customer_type:'客户类型'};
  const el=document.createElement('div');el.className='overlay';el.id='drill-ov';
  const rows=list.length===0?'<div class="empty">暂无数据</div>':list.map(c=>{
    return`<div class="drill-row">
      <div style="flex:1;min-width:0">
        <div class="nlink" style="font-size:13px" onclick="openDetail('${c.id}')">${esc(c.name)}</div>
        <div style="font-size:11px;color:#94a3b8">${esc(c.company)} · ${esc(c.sales)}</div>
      </div>
      <div style="min-width:60px;font-size:12px;color:#64748b">${esc(c.country)||'—'}</div>
      <div style="min-width:60px;font-size:12px;color:#64748b">${esc(c.source)||'—'}</div>
      <div style="min-width:70px"><span class="badge s-${c.status||''}">${c.status||'未设置'}</span></div>
    </div>`;}).join('');
  el.innerHTML=`<div class="modal mlg">
    <div class="mh">
      <div class="mt">${labels[field]||field}：${esc(value||'全部')} <span style="font-size:13px;color:#94a3b8;font-weight:400">${list.length}个客户</span></div>
      <button class="xb" onclick="document.getElementById('drill-ov').remove()">×</button>
    </div>
    <div style="padding:0 0 8px">
      <div style="padding:7px 14px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 70px 70px 70px;font-size:11px;font-weight:700;color:#64748b;letter-spacing:.5px">
        <span>客户名称</span><span>国家</span><span>来源</span><span>状态</span>
      </div>
      <div style="max-height:55vh;overflow-y:auto">${rows}</div>
    </div>
  </div>`;
  document.body.appendChild(el);el.addEventListener('click',ev=>{if(ev.target===el)el.remove()});
}

    return(!q||c.name?.toLowerCase().includes(q)||c.company?.toLowerCase().includes(q)||c.phone?.includes(q)||c.country?.toLowerCase().includes(q))
      &&(fSales==='全部'||c.sales===fSales)
      &&(fStat==='全部'||(c.status||'')===fStat)
      &&(fCo==='全部'||c.country===fCo)
      &&(fSrc==='全部'||c.source===fSrc)
      &&(fCtype==='全部'||(c.customer_type||'')===fCtype)
      &&(!fDup||isDup(c,c.id));

  filtered=filterByDate(filtered,fDateRange,fDateStart,fDateEnd);

  const totalPages=Math.max(1,Math.ceil(total/cusPageSize));

  const paged=filtered.slice((cusPage-1)*cusPageSize,cusPage*cusPageSize);

      </td>
      <td class="col-hide" style="color:#64748b;white-space:nowrap;font-size:12px">${fmt(cusDate(c))}</td>
      <td class="col-hide" style="font-size:12px">

        ${c.phone?`<div style="color:#374151;cursor:pointer" onclick="navigator.clipboard.writeText('${esc(c.phone)}');toast('📋 电话已复制')" title="点击复制">📞 ${esc(c.phone)}</div>`:''}
        ${!c.email&&!c.phone?'<span style="color:#cbd5e1">—</span>':''}

      </div></td>
    </tr>`;}).join('');

  const pageNums=[];

    <div class="filter-bar">

    </div>

function loadFile(inp){
  const f=inp.files[0];if(!f)return;
  document.getElementById('fn').textContent=f.name;
  const tryRead=(enc)=>{
    const r=new FileReader();
    r.onload=e=>{
      const txt=e.target.result;
      if(enc==='UTF-8'&&txt.includes('\uFFFD')){tryRead('GBK');}
      else{document.getElementById('imp-txt').value=txt;}
    };
    r.readAsText(f,enc);
  };
  tryRead('UTF-8');
}

function parseCSV(raw){
  const rows=[];
  let cur='',inQ=false,fields=[];
  for(let i=0;i<raw.length;i++){
    const ch=raw[i],nx=raw[i+1];
    if(ch==='"'){
      if(inQ&&nx==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(ch===','&&!inQ){
      fields.push(cur.trim());cur='';
    } else if((ch==='\n'||ch==='\r')&&!inQ){
      if(ch==='\r'&&nx==='\n')i++;
      fields.push(cur.trim());cur='';
      if(fields.some(f=>f!==''))rows.push(fields);
      fields=[];
    } else {
      cur+=ch;
    }
  }
  if(cur||fields.length){fields.push(cur.trim());if(fields.some(f=>f!==''))rows.push(fields);}
  return rows;
}

function fixDate(s){
  if(!s)return null;
  const m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(!m)return null;
  return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
}

async function doImp(){
  const raw=document.getElementById('imp-txt')?.value;
  if(!raw?.trim()){toast('请粘贴 CSV 数据');return;}
  const rows=parseCSV(raw);
  if(rows.length<2){toast('至少需要表头+一行数据');return;}
  const headers=rows[0].map(h=>h.replace(/^\uFEFF/,'').trim());
  const map={
    姓名:'name',公司:'company',邮箱:'email',电话:'phone',来源:'source',国家:'country',
    地区:'region',负责销售:'sales',状态:'status',包装物料:'packaging_material',
    包装重量:'packaging_weight',包装速度:'packaging_speed',真空需求:'vacuum_need',
    自动化需求:'automation_need',客户类型:'customer_type',客户性质:'self_type',
    预计购买:'purchase_timeline',项目详情:'project_details',备注:'notes',创建时间:'custom_date'
  };
  const data=[];
  for(let i=1;i<rows.length;i++){
    const vals=rows[i];
    const obj={products:[]};
    headers.forEach((h,j)=>{if(map[h])obj[map[h]]=(vals[j]||'').trim();});
    if(!obj.name)continue;
    if(!obj.sales)obj.sales=CU;
    obj.custom_date=fixDate(obj.custom_date)||T();
    data.push(obj);
  }
  if(!data.length){toast('没有有效数据行');return;}
  let total=0;
  for(let i=0;i<data.length;i+=50){
    const batch=data.slice(i,i+50);
    const{error}=await db.from('customers').insert(batch);
    if(error){toast(`导入失败(第${i+1}行起): ${error.message}`);return;}
    total+=batch.length;
  }
  toast(`✅ 成功导入 ${total} 条`);
  document.getElementById('imp-ov')?.remove();
  await load();
}

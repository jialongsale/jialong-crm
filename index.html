<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JIALONG CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F5F5F7;--surface:#fff;--surface2:#FAFAFA;--surface-blur:rgba(255,255,255,.92);
  --border:#E8E8ED;--border-l:#F2F2F7;
  --tp:#1D1D1F;--ts:#86868B;--tt:#AEAEB2;
  --brand:#0066CC;--brand-l:#EBF4FF;--brand-h:#0055A5;
  --success:#34C759;--success-l:#F0FBF3;
  --warn:#FF9500;--warn-l:#FFF8ED;
  --danger:#FF3B30;--danger-l:#FFF2F1;
  --teal:#0891b2;--teal-l:#ECFEFF;
  --purple:#AF52DE;--purple-l:#F5EEFF;
  --rose:#78716c;--rose-l:#F5F0EE;
  --sb:224px;--r:8px;--r2:12px;--r3:16px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 24px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --ease:cubic-bezier(.16,1,.3,1);
}
body.dark{
  --bg:#000;--surface:#1C1C1E;--surface2:#2C2C2E;--surface-blur:rgba(28,28,30,.92);
  --border:#38383A;--border-l:#2C2C2E;
  --tp:#F5F5F7;--ts:#A1A1A6;--tt:#6E6E73;
  --brand:#0A84FF;--brand-l:#001e3c;--brand-h:#409CFF;
  --success:#30D158;--success-l:#0d2918;
  --warn:#FF9F0A;--warn-l:#2a1f00;
  --danger:#FF453A;--danger-l:#2a0a09;
  --teal:#64D2FF;--teal-l:#00263d;
  --purple:#DA8FFF;--purple-l:#2d1a40;
  --rose:#a8a29e;--rose-l:#292524;
  --sh:0 1px 3px rgba(0,0,0,.4);--sh2:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ts); }
body{font-family:'DM Sans',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
button{cursor:pointer;font-family:inherit;border:none}
input,select,textarea{font-family:inherit;outline:none}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#08090f,#0f172a,#132240);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--surface);border-radius:20px;padding:40px;width:380px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--brand),#003d99);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800;margin:0 auto 14px;box-shadow:0 8px 24px rgba(0,102,204,.35)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--tt);margin-bottom:28px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.user-btn{padding:12px;border-radius:var(--r2);border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--ts);transition:all .15s}
.user-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-l)}
.user-btn.admin{background:var(--tp);color:var(--bg);border-color:var(--tp);grid-column:span 2;margin-top:4px}

/* APP LAYOUT */
#app{display:flex;min-height:100vh}
.sb{width:var(--sb);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:50}
.sb-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-l)}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--brand),#003d99);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;color:var(--tp)}
.logo-sub{font-size:10px;color:var(--tt);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.ng{margin-bottom:16px}
.nlbl{font-size:10px;font-weight:700;color:var(--tt);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin:6px 0 3px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:all .15s;color:var(--ts);font-size:13px;font-weight:500;position:relative;margin-bottom:1px;user-select:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--surface2);color:var(--tp)}
.ni:active{transform:scale(.98)}
.ni.on{background:var(--brand-l);color:var(--brand);font-weight:600}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--brand);border-radius:0 3px 3px 0}
.nicon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--danger);color:#fff;line-height:1.5}
.nbadge.warn{background:var(--warn)}
.sb-foot{padding:8px;border-top:1px solid var(--border-l)}
.urow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.urow:hover{background:var(--surface2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--brand-l);color:var(--brand);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* MAIN */
.main-wrap{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
.topbar{height:58px;background:var(--surface-blur);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:40}
.tb-left{min-width:0}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.tb-sub{font-size:12px;color:var(--tt);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.content{padding:22px 24px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s var(--ease);font-family:inherit;line-height:1;white-space:nowrap}
.btn:active{transform:scale(.96)}
.bp{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(0,102,204,.2)}.bp:hover{background:var(--brand-h)}
.bg{background:transparent;color:var(--ts);border:1px solid var(--border)}.bg:hover{background:var(--surface2);color:var(--tp)}
.ib{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--ts);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:14px;flex-shrink:0}
.ib:hover{background:var(--surface2);color:var(--tp)}

/* FILTERS */
.fsec{background:var(--surface);border-radius:var(--r2);padding:14px 18px;margin-bottom:16px;box-shadow:var(--sh);border:1px solid var(--border-l)}
.frow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.frow+.frow{margin-top:12px;padding-top:12px;border-top:1px solid var(--border-l)}
.sbox{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:7px 11px;min-width:200px;flex:1;max-width:280px;transition:all .2s}
.sbox:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,204,.1);background:var(--surface)}
.sbox input{border:none;background:transparent;font-size:13px;color:var(--tp);width:100%;outline:none;font-family:inherit}
.sbox input::placeholder{color:var(--tt)}
.fsel{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--ts);font-family:inherit;cursor:pointer;transition:all .15s}
.fsel:hover{border-color:var(--tt);color:var(--tp)}.fsel:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.pill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--ts);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--brand);color:var(--brand)}.pill.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand);font-weight:600}
.flbl{font-size:11px;font-weight:700;color:var(--tt);white-space:nowrap;flex-shrink:0}
.more-filter-btn{font-size:12px;color:var(--ts);cursor:pointer;padding:7px 12px;border-radius:var(--r);border:1px solid var(--border);background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.more-filter-btn:hover{border-color:var(--tt);color:var(--tp);background:var(--surface2)}
#adv-filters{display:none;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-l)}
#adv-filters.open{display:flex}

/* TABLE */
.tc{background:var(--surface);border-radius:var(--r2);box-shadow:var(--sh);border:1px solid var(--border-l);overflow:hidden;display:flex;flex-direction:column}
.tc-head{padding:13px 20px;border-bottom:1px solid var(--border-l);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.tc-title{font-size:14px;font-weight:700;color:var(--tp)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{position:sticky;top:0;z-index:10;background:var(--surface);padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--tt);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
thead th:first-child{padding-left:20px}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border-l);vertical-align:middle}
tbody td:first-child{padding-left:20px}
tbody tr:last-child td{border-bottom:none}
body.compact tbody td{padding:6px 12px}
body.compact tbody td:first-child{padding-left:20px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.s-潜在{background:var(--brand-l);color:var(--brand)}.s-意向{background:var(--warn-l);color:var(--warn)}
.s-成交{background:var(--success-l);color:var(--success)}.s-流失{background:var(--border-l);color:var(--ts)}
.s-垃圾{background:var(--danger-l);color:var(--danger)}.s-{background:var(--border-l);color:var(--tt)}
.s-转交代理商{background:var(--teal-l);color:var(--teal)}
.rating{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:1px solid;flex-shrink:0}
.r-A{background:var(--warn-l);color:var(--warn);border-color:rgba(255,149,0,.3)}
.r-B{background:var(--brand-l);color:var(--brand);border-color:rgba(0,102,204,.2)}
.r-C{background:var(--teal-l);color:var(--teal);border-color:rgba(8,145,178,.2)}
.r-D{background:var(--rose-l);color:var(--rose);border-color:rgba(120,113,108,.25)}
.rs{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;border:1px solid var(--border);background:var(--surface2);color:var(--tt);cursor:pointer;transition:all .15s}
.rs:hover{border-color:var(--ts);color:var(--ts)}
.sel-A{background:var(--warn-l)!important;color:var(--warn)!important;border-color:rgba(255,149,0,.3)!important}
.sel-B{background:var(--brand-l)!important;color:var(--brand)!important;border-color:rgba(0,102,204,.2)!important}
.sel-C{background:var(--teal-l)!important;color:var(--teal)!important;border-color:rgba(8,145,178,.2)!important}
.sel-D{background:var(--rose-l)!important;color:var(--rose)!important;border-color:rgba(120,113,108,.25)!important}

/* CONTACT BTNS */
.wa-btn,.mail-btn{width:22px;height:22px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:none;transition:all .15s;flex-shrink:0}
.wa-btn{background:var(--success-l);color:var(--success)}.wa-btn:hover{background:var(--success);color:#fff}
.mail-btn{background:var(--brand-l);color:var(--brand)}.mail-btn:hover{background:var(--brand);color:#fff}

/* ROW ACTIONS */
.acts{display:flex;gap:4px;align-items:center}
.ab{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid;white-space:nowrap;cursor:pointer;font-family:inherit;transition:all .12s;background:transparent}
.ag{color:var(--success);border-color:rgba(52,199,89,.3);background:var(--success-l)}.ag:hover{background:var(--success);color:#fff;border-color:var(--success)}
.ab2{color:var(--brand);border-color:rgba(0,102,204,.2);background:var(--brand-l)}.ab2:hover{background:var(--brand);color:#fff}
.ac{color:var(--ts);border-color:var(--border);background:var(--surface2)}.ac:hover{color:var(--tp);border-color:var(--ts)}
.ar{color:var(--danger);border-color:rgba(255,59,48,.2);background:var(--danger-l)}.ar:hover{background:var(--danger);color:#fff}
.more-dd-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ts);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;position:relative;font-family:inherit;vertical-align:middle}
.more-dd-btn:hover{background:var(--surface2);color:var(--tp)}
.dd{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);z-index:200;min-width:110px;overflow:hidden;display:none}
.dd.open{display:block}
.ddi{padding:8px 14px;font-size:12px;cursor:pointer;color:var(--ts);transition:background .1s;white-space:nowrap}
.ddi:hover{background:var(--surface2);color:var(--tp)}.ddi.danger{color:var(--danger)}.ddi.danger:hover{background:var(--danger-l)}

/* STAT CARDS */
.sc{background:var(--surface);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--border-l);cursor:pointer;transition:all .25s var(--ease)}
.sc:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.sc-lbl{font-size:11px;font-weight:700;color:var(--tt);letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px}
.sc-val{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}
.sc.sm{padding:12px 14px}.sc.sm .sc-val{font-size:20px;letter-spacing:-.5px}.sc.sm .sc-lbl{font-size:9px;margin-bottom:4px}

/* CHARTS */
.cc{background:var(--surface);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--border-l)}
.cc-title{font-size:11px;font-weight:700;color:var(--tt);letter-spacing:.4px;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.bar-chart{max-height:200px;overflow-y:auto;padding-right:2px}
.bar-chart::-webkit-scrollbar{width:3px}.bar-chart::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:11px;color:var(--ts);width:90px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.bar-val{font-size:11px;color:var(--tt);width:28px;font-family:monospace;text-align:right;flex-shrink:0}
.chart-wrap{position:relative;height:150px}
.perf-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-l)}
.perf-row:last-child{border-bottom:none}
.pav{width:24px;height:24px;border-radius:50%;background:var(--brand-l);color:var(--brand);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pname{font-size:13px;font-weight:600;flex:1}
.ptrack{height:4px;background:var(--border);border-radius:2px;overflow:hidden;width:80px;flex-shrink:0}
.pfill{height:100%;background:var(--success);border-radius:2px;transition:width .5s}
.pstat{font-size:11px;color:var(--ts);font-family:monospace;min-width:72px;text-align:right}

/* TASKS */
.task-row{background:var(--surface);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;border:1px solid var(--border-l);transition:all .15s;margin-bottom:3px}
.task-row:hover{border-color:var(--brand);box-shadow:var(--sh)}
.tinfo{flex:1;min-width:0}
.tname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.tmeta{font-size:11px;color:var(--tt);margin-bottom:2px}
.tprev{font-size:12px;color:var(--ts);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.tr-right{display:flex;align-items:center;gap:5px;flex-shrink:0}

/* DOTS */
.sdots{display:flex;gap:3px;align-items:center;margin-top:3px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0}
.dot.done{background:var(--success)}.dot.cur{background:var(--warn)}
.nf-pend{color:var(--tt);font-size:12px}.nf-soon{color:var(--warn);font-size:12px;font-weight:600}
.nf-today{color:var(--danger);font-size:12px;font-weight:700}.nf-over{color:var(--danger);font-size:12px;font-weight:700}
.nf-done{color:var(--success);font-size:12px;font-weight:500}

/* MISC */
.dup-w{background:var(--warn-l);color:var(--warn);font-size:10px;padding:1px 5px;border-radius:4px;margin-left:3px;font-weight:600}
.sea-badge{background:var(--danger-l);color:var(--danger);font-size:10px;padding:1px 5px;border-radius:4px;margin-left:3px;font-weight:600}

/* PAGE BAR */
.pbar{display:flex;align-items:center;gap:5px;padding:10px 20px;border-top:1px solid var(--border-l);flex-wrap:wrap}
.pinfo{font-size:12px;color:var(--tt);flex:1}
.pbtn{min-width:28px;height:28px;padding:0 6px;border-radius:6px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--ts);transition:all .12s;font-family:inherit}
.pbtn:hover{background:var(--surface2)}.pbtn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.pbtn:disabled{opacity:.4;cursor:not-allowed}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:500;display:flex;justify-content:flex-end;animation:dvFade .25s var(--ease)}
.drawer{width:460px;max-width:95vw;background:var(--surface);box-shadow:-4px 0 40px rgba(0,0,0,.12);display:flex;flex-direction:column;height:100%;animation:dvSlide .3s var(--ease)}
@keyframes dvFade{from{opacity:0}to{opacity:1}}
@keyframes dvSlide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-header{padding:20px 24px 16px;border-bottom:1px solid var(--border-l);flex-shrink:0;position:relative}
.drawer-close{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);color:var(--ts);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.drawer-close:hover{background:var(--border);color:var(--tp)}
.cus-name{font-size:16px;font-weight:700;color:var(--tp)}
.cus-meta{font-size:12px;color:var(--tt);display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.drawer-body{flex:1;overflow-y:auto;padding:18px 24px}
.drawer-body::-webkit-scrollbar{width:4px}.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.drawer-footer{padding:12px 24px;border-top:1px solid var(--border-l);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.dfg{margin-bottom:15px}
.dfl{font-size:12px;font-weight:600;color:var(--ts);display:block;margin-bottom:6px}
.dfi{width:100%;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;color:var(--tp);background:var(--surface);font-family:inherit;transition:all .2s}

const diffD=d=>d?Math.floor((new Date(d)-new Date(T()))/86400000):null;
const fmt=d=>d?new Date(d).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}):'—';

function isSea(c){
  if(DONE_STATUSES.includes(c.status) || c.status === '意向') return false;
  const r=c.last_follow_date||c.first_follow_date||c.created_at?.split('T')[0];
  if(!r)return false;
  return addD(r,30)<T();
}
function isTask(c){
  if(DONE_STATUSES.includes(c.status))return false;
  if((c.follow_stage||0)>=5)return false;
  if((c.follow_stage||0)===0)return true;
  return c.next_follow_date&&c.next_follow_date<=T();
}
function isNoResp(c){
  if(DONE_STATUSES.includes(c.status)||!c.last_follow_date||(c.follow_stage||0)===0)return false;
  return addD(c.last_follow_date,15)<T();
}
function isDup(c, skip=null){
  const cleanPhone = p => p ? p.replace(/\D/g, '') : '';
  const p1 = cleanPhone(c.phone);
  const e1 = c.email ? c.email.trim().toLowerCase() : '';

  return ALL.some(x => {
    if(x.id === skip) return false;
    
    const p2 = cleanPhone(x.phone);
    const e2 = x.email ? x.email.trim().toLowerCase() : '';
    
    const phoneMatch = p1.length > 5 && p1 === p2;
    const emailMatch = e1.length > 0 && e1 === e2;
    
    return phoneMatch || emailMatch;
  });
}
function nfi(c){
  const s=c.follow_stage||0;
  if(DONE_STATUSES.includes(c.status))return{t:'✅ 完成',cls:'nf-done'};
  if(s>=5)return{t:'✅ 完成',cls:'nf-done'};
  if(s===0)return{t:'待首次跟进',cls:'nf-pend'};
  const d=diffD(c.next_follow_date);
  if(d===null)return{t:'—',cls:'nf-pend'};
  if(d<0)return{t:`逾期${-d}天`,cls:'nf-over'};
  if(d===0)return{t:'今天!',cls:'nf-today'};
  if(d<=3)return{t:`${d}天后`,cls:'nf-soon'};
  return{t:fmt(c.next_follow_date),cls:'nf-pend'};
}

async function fetchAll(table,orderCol){
  let all=[],from=0;
  while(true){
    const{data,error}=await db.from(table).select('*').order(orderCol,{ascending:false,nullsFirst:false}).range(from,from+999);
    if(error||!data||data.length===0)break;
    all=[...all,...data];
    if(data.length<1000)break;
    from+=1000;
  }
  return all;
}
async function load(){
  if (typeof showLoading === 'function') showLoading(true);
  const [cr, fb] = await Promise.all([

  ]);
  ALL = cr || [];
  FB_ADS = fb || [];

}

function getDateRange(range,start,end){
  const t=T();
  if(range==='today')return{s:t,e:t};
  if(range==='yesterday'){const y=addD(t,-1);return{s:y,e:y};}
  if(range==='7')return{s:addD(t,-6),e:t};
  if(range==='15')return{s:addD(t,-14),e:t};
  if(range==='14')return{s:addD(t,-13),e:t};
  if(range==='30')return{s:addD(t,-29),e:t};
  if(range==='month'){const d=new Date();return{s:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`,e:t};}
  if(range==='lastmonth'){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0');const last=new Date(y,d.getMonth()+1,0).getDate();return{s:`${y}-${m}-01`,e:`${y}-${m}-${last}`};}
  if(range==='custom')return{s:start,e:end};
  return null;
}
function filterByDate(list,range,start,end){
  const r=getDateRange(range,start,end);
  if(!r||!r.s)return list;
  return list.filter(c=>{const d=cusDate(c);return d>=r.s&&d<=r.e;});
}
function aggSorted(src,field){
  const m={};
  src.forEach(c=>{const v=c[field]||'';if(v)m[v]=(m[v]||0)+1;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function barChartHtml(data,color='var(--brand)'){
  if(!data.length)return'<div style="color:var(--tt);font-size:12px">暂无数据</div>';
  const max=Math.max(...data.map(d=>d[1]),1);
  return data.slice(0,15).map(([label,count])=>`<div class="bar-row"><div class="bar-lbl" title="${esc(label)}">${esc(label)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%;background:${color}"></div></div><div class="bar-val">${count}</div></div>`).join('');
}

function renderDashChart(){
  const src=isAdm()&&dashSales==='全部'?ALL:(isAdm()?ALL.filter(c=>c.sales===dashSales):CUS);
  Object.values(CI).forEach(c=>{try{c.destroy()}catch(e){}});CI={};
  const r=getDateRange(dashDateRange, dashDateStart, dashDateEnd);
  let days;
  if(!r||!r.s)days=Array.from({length:14},(_,i)=>addD(T(),i-13));
  else{days=[];let d=r.s;while(d<=r.e){days.push(d);d=addD(d,1);}}
  const ctx=document.getElementById('cd');if(!ctx)return;
  CI['cd']=new Chart(ctx,{
    type:'bar',
    data:{
      labels:days.map(d=>fmt(d)),
      datasets:[{
        data:days.map(d=>src.filter(c=>cusDate(c)===d).length),
        backgroundColor:'rgba(0,102,204,.65)',
        borderRadius:4,
        borderSkipped:false
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:true,ticks:{stepSize:1,color:'#86868B',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},
        x:{ticks:{maxRotation:45,font:{size:9},color:'#86868B'},grid:{display:false}}
      },
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          const date = days[idx];
          openDashDrill('date', date);
        }
      },
      onHover: (e, elements) => {
        e.native.target.style.cursor = elements.length ? 'pointer' : 'default';
      }
    }
  });
}

// ===== TASKS =====
window.snoozeTask = window.snoozeTask || async function(id, days) {
  const c = ALL.find(x => x.id === id);
  if (!c) return;
  
  const baseDate = (c.next_follow_date && c.next_follow_date > T()) ? c.next_follow_date : T();
  const nextDate = addD(baseDate, days);
  
  showLoading(true);
  await db.from('customers').update({next_follow_date: nextDate}).eq('id', id);
  showLoading(false);
  toast(`✅ 智能延期至 ${nextDate}`);
  await load();
};

window.taskSelIds = window.taskSelIds || new Set();

window.toggleTaskSel = function(id, checked) {
  if (checked) window.taskSelIds.add(id);
  else window.taskSelIds.delete(id);
  render();
};

window.toggleAllTasks = function(cb) {
  if (cb.checked) {
    window._currentTaskIds.forEach(id => window.taskSelIds.add(id));
  } else {
    window._currentTaskIds.forEach(id => window.taskSelIds.delete(id));
  }
  render();
};

window.batchSnoozeTask = async function(days) {
  if (window.taskSelIds.size === 0) return;
  showLoading(true);
  for (let id of window.taskSelIds) {
    const c = ALL.find(x => x.id === id);
    if (!c) continue;
    const baseDate = (c.next_follow_date && c.next_follow_date > T()) ? c.next_follow_date : T();
    await db.from('customers').update({next_follow_date: addD(baseDate, days)}).eq('id', id);
  }
  
  showLoading(false);
  toast(`✅ 已将 ${window.taskSelIds.size} 个任务智能推迟`);
  window.taskSelIds.clear();
  await load();
};

// ===== TASKS =====
function renderTasks() {
  window.fTaskTab = window.fTaskTab || 'today'; 
  window.fTaskSearch = window.fTaskSearch || '';
  window.fTaskRating = window.fTaskRating || '全部';
  window.fTaskSort = window.fTaskSort || 'created_desc';
  window.fTaskType = window.fTaskType || 'all';
  window.fTaskCountry = window.fTaskCountry || '全部';
  window.fTaskTag = window.fTaskTag || '全部';
  window.fTaskStage = window.fTaskStage || 'all'; 

  const tDate = T();
  const futureDate = addD(tDate, 3);
  
  const rawTasks = ALL.filter(c => {
    if(DONE_STATUSES.includes(c.status)) return false;
    if((c.follow_stage||0) >= 5) return false;
    if((c.follow_stage||0) === 0) return true;
    if(!c.next_follow_date) return false;
    return c.next_follow_date <= futureDate; 
  }).filter(c => isAdm() ? (dashSales === '全部' || c.sales === dashSales) : c.sales === CU);

  const taskCountries = [...new Set(rawTasks.map(c => c.country).filter(Boolean))].sort();
  const taskTags = [...new Set(rawTasks.flatMap(c => c.tags || []))].sort();

  const cntOverdue = rawTasks.filter(c => c.next_follow_date < tDate && c.follow_stage > 0).length;
  const cntToday = rawTasks.filter(c => {
    const isStageZero = (c.follow_stage || 0) === 0;
    const isPureNew = isStageZero && diffD(cusDate(c)) > -7;
    return (c.next_follow_date === tDate && !isStageZero) || isPureNew;
  }).length;
  const cntNew = rawTasks.filter(c => {
    const isStageZero = (c.follow_stage || 0) === 0;
    const isRecycled = isStageZero && diffD(cusDate(c)) <= -7;
    return isRecycled;
  }).length;
  const cntFuture = rawTasks.filter(c => c.next_follow_date > tDate && c.next_follow_date <= futureDate && c.follow_stage > 0).length;

  const baseTasksForCounts = rawTasks.filter(c => {
    const isStageZero = (c.follow_stage || 0) === 0;
    const daysSinceCreated = diffD(cusDate(c));
    const isRecycled = isStageZero && daysSinceCreated <= -7;
    const isPureNew = isStageZero && daysSinceCreated > -7;

    const isOverdue = c.next_follow_date < tDate && !isStageZero;
    const isToday = c.next_follow_date === tDate && !isStageZero;
    const isFuture = c.next_follow_date > tDate && c.next_follow_date <= futureDate && !isStageZero;

    if (window.fTaskTab === 'overdue' && !isOverdue) return false;
    if (window.fTaskTab === 'today' && !(isToday || isPureNew)) return false;
    if (window.fTaskTab === 'new' && !isRecycled) return false;
    if (window.fTaskTab === 'future' && !isFuture) return false;

    if (window.fTaskRating !== '全部' && (c.rating || '') !== window.fTaskRating) return false;
    if (window.fTaskCountry !== '全部' && c.country !== window.fTaskCountry) return false;
    if (window.fTaskTag !== '全部' && !(c.tags||[]).includes(window.fTaskTag)) return false;

    const q = window.fTaskSearch.toLowerCase();
    if (q) {
      const match = (c.name||'').toLowerCase().includes(q) ||
                    (c.company||'').toLowerCase().includes(q) ||
                    (c.last_log_note||'').toLowerCase().includes(q) ||
                    (c.phone||'').includes(q) ||
                    (c.email||'').toLowerCase().includes(q);
      if (!match) return false;
    }
    return true;
  });

  const stageCounts = {
    '0': baseTasksForCounts.filter(c => (c.follow_stage||0)===0).length,
    '1': baseTasksForCounts.filter(c => c.follow_stage===1).length,
    '2': baseTasksForCounts.filter(c => c.follow_stage===2).length,
    '3': baseTasksForCounts.filter(c => c.follow_stage===3).length,
    '4': baseTasksForCounts.filter(c => c.follow_stage===4).length,
  };

  let filtered = baseTasksForCounts.filter(c => {
    const currentStage = (c.follow_stage || 0).toString();
    if (window.fTaskStage !== 'all' && currentStage !== window.fTaskStage) return false;
    return true;
  });

  filtered.sort((a, b) => {
    if (window.fTaskSort === 'rating') {
      const rm = {'A':1, 'B':2, 'C':3, 'D':4, '':5};
      const rA = rm[a.rating] || 5;
      const rB = rm[b.rating] || 5;
      if (rA !== rB) return rA - rB;
    }
    if (window.fTaskSort === 'created_desc') {
      return cusDate(a) > cusDate(b) ? -1 : 1;
    }
    if (window.fTaskSort === 'silent_desc') {
      const dA = a.last_follow_date || '2000-01-01';
      const dB = b.last_follow_date || '2000-01-01';
      return dA < dB ? -1 : 1;
    }
    const dateA = ((a.follow_stage||0)===0) ? cusDate(a) : (a.next_follow_date || '9999-99-99');
    const dateB = ((b.follow_stage||0)===0) ? cusDate(b) : (b.next_follow_date || '9999-99-99');
    return dateA < dateB ? -1 : 1;
  });

  window._currentTaskIds = filtered.map(c => c.id);

  const tabCard = (id, count, label, icon, color, bgL) => `
    <div style="flex:1; background:${window.fTaskTab===id? `var(--${bgL})` : 'var(--surface)'}; border:1px solid ${window.fTaskTab===id? `var(--${color})` : 'var(--border-l)'}; border-radius:var(--r2); padding:12px; text-align:center; cursor:pointer; transition:all .2s" onclick="window.taskSelIds.clear();window.fTaskTab='${id}';window.fTaskType='all';window.fTaskStage='all';render()">
      <div style="font-size:22px; font-weight:700; color:var(--${color}); line-height:1">${count}</div>
      <div style="font-size:12px; color:var(--${window.fTaskTab===id?color:'ts'}); font-weight:600; margin-top:6px;">${icon} ${label}</div>
    </div>
  `;

  const headerHtml = `
  <div style="display:flex; gap:10px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px;">
    ${tabCard('overdue', cntOverdue, '逾期未跟', '🔴', 'danger', 'danger-l')}
    ${tabCard('today', cntToday, '今日任务', '🟠', 'warn', 'warn-l')}
    ${tabCard('new', cntNew, '公海捞回', '🔵', 'brand', 'brand-l')}
    ${tabCard('future', cntFuture, '未来三天', '⚪', 'ts', 'surface2')}
  </div>
  <div class="fsec">
    <div class="frow">
      <div class="sbox"><span style="color:var(--tt)">🔍</span><input value="${esc(window.fTaskSearch)}" oninput="window.fTaskSearch=this.value; clearTimeout(window._tst); window._tst=setTimeout(render,600)" placeholder="搜姓名/公司/电话/备注..."/></div>
      <select class="fsel" onchange="window.fTaskRating=this.value;render()">
        <option value="全部">全部评级</option>
        <option value="A" ${window.fTaskRating==='A'?'selected':''}>⭐ 仅看 A 级</option>
        <option value="B" ${window.fTaskRating==='B'?'selected':''}>👍 仅看 B 级</option>
      </select>
      <select class="fsel" onchange="window.fTaskSort=this.value;render()">
        <option value="urgent" ${window.fTaskSort==='urgent'?'selected':''}>按紧急程度优先</option>
        <option value="rating" ${window.fTaskSort==='rating'?'selected':''}>按客户评级优先</option>
        <option value="created_desc" ${window.fTaskSort==='created_desc'?'selected':''}>按入库时间 (最新优先)</option>
        <option value="silent_desc" ${window.fTaskSort==='silent_desc'?'selected':''}>按静默时长 (最久未联)</option>
      </select>
    </div>
    
    <div class="frow" style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--border-l)">
      <select class="fsel" onchange="window.fTaskCountry=this.value;render()" style="min-width:140px">
        <option value="全部">🌍 全部国家/时区</option>
        ${taskCountries.map(c=>`<option ${window.fTaskCountry===c?'selected':''}>${esc(c)}</option>`).join('')}
      </select>
      <select class="fsel" onchange="window.fTaskTag=this.value;render()" style="min-width:140px">
        <option value="全部">🏷️ 全部高意向标签</option>
        ${taskTags.map(t=>`<option ${window.fTaskTag===t?'selected':''}>${esc(t)}</option>`).join('')}
      </select>
    </div>

    <div class="frow" style="margin-top:12px; padding-top:12px; border-top:1px dashed var(--border-l)">
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <span style="font-size:12px; font-weight:700; color:var(--ts); margin-right:4px;">跟进阶段:</span>
        <div onclick="window.fTaskStage='all';render()" class="pill ${window.fTaskStage==='all'?'on':''}">全部</div>
        <div onclick="window.fTaskStage='0';render()" class="pill ${window.fTaskStage==='0'?'on':''}">🔥 首次跟进 (${stageCounts['0']})</div>
        <div onclick="window.fTaskStage='1';render()" class="pill ${window.fTaskStage==='1'?'on':''}">📞 3天回访 (${stageCounts['1']})</div>
        <div onclick="window.fTaskStage='2';render()" class="pill ${window.fTaskStage==='2'?'on':''}">💬 7天回访 (${stageCounts['2']})</div>
        <div onclick="window.fTaskStage='3';render()" class="pill ${window.fTaskStage==='3'?'on':''}">⏳ 15天回访 (${stageCounts['3']})</div>
        <div onclick="window.fTaskStage='4';render()" class="pill ${window.fTaskStage==='4'?'on':''}">💤 30天回访 (${stageCounts['4']})</div>
      </div>
    </div>
  </div>
  `;

  if(!filtered.length) {
     return tbHtml('⚡ 今日待办', `${T()}`, `<button class="btn bp" onclick="openAdd()">+ 新建客户</button>`) + headerHtml + `<div class="empty" style="margin-top:40px"><div class="empty-icon">✓</div><div class="empty-ttl">当前区间无任务</div><div style="font-size:13px; color:var(--ts)">您可以切换顶部的任务面板或跟进阶段查看</div></div></div>`;
  }

  const batchActionBar = window.taskSelIds.size > 0 ? `
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; padding:10px 14px; background:var(--brand-l); border-radius:var(--r2); border:1px solid rgba(0,102,204,.2); align-items:center">
      <span style="font-size:13px; font-weight:700; color:var(--brand); margin-right:6px">已选 ${window.taskSelIds.size} 项</span>
      <button onclick="batchSnoozeTask(1)" style="padding:5px 12px; border-radius:6px; border:none; background:#fff; color:var(--tp); box-shadow:var(--sh); font-size:12px; font-weight:600; cursor:pointer;">推迟至明天</button>
      <button onclick="batchSnoozeTask(3)" style="padding:5px 12px; border-radius:6px; border:none; background:#fff; color:var(--tp); box-shadow:var(--sh); font-size:12px; font-weight:600; cursor:pointer;">推迟 3 天</button>
      <button onclick="batchSnoozeTask(7)" style="padding:5px 12px; border-radius:6px; border:none; background:#fff; color:var(--tp); box-shadow:var(--sh); font-size:12px; font-weight:600; cursor:pointer;">推迟下周</button>
      <button onclick="window.taskSelIds.clear();render()" style="padding:5px 12px; border-radius:6px; border:1px solid var(--brand); background:transparent; color:var(--brand); font-size:12px; font-weight:600; cursor:pointer; margin-left:auto">✕ 取消</button>

  ` : '';

  const selectAllHtml = `

      <span style="font-size:13px; color:var(--ts); font-weight:500">全选当前列表 (${filtered.length}个任务)</span>
    </div>

  const listHtml = `<div style="display:flex;flex-direction:column;gap:12px;padding-bottom:40px">` + filtered.map(c => {

    let wa = waLink(c.phone), ml = mailLink(c.email);

    const isStageZero = (c.follow_stage || 0) === 0;

    const isRecycled = isStageZero && daysSinceCreated <= -7;
    
    let badgeHtml = '';
    if (isRecycled) {
        badgeHtml = '<span style="font-size:10px; font-weight:700; color:var(--teal); background:var(--teal-l); padding:4px; border-radius:4px; writing-mode:vertical-rl; letter-spacing:2px; margin-top:4px">公海捞回</span>';
    } else if (isStageZero) {
        badgeHtml = '<span style="font-size:10px; font-weight:700; color:var(--danger); background:var(--danger-l); padding:4px; border-radius:4px; writing-mode:vertical-rl; letter-spacing:2px; margin-top:4px">新线索</span>';
    }
    
    let stageBadge = '';
    const s = c.follow_stage || 0;
    if (s == 0) stageBadge = `<span style="font-size:11px;font-weight:700;color:var(--danger);background:var(--danger-l);padding:2px 6px;border-radius:4px;border:1px solid rgba(255,59,48,.2)">🔥 首次跟进</span>`;

// 1. 修复 Key 获取逻辑：确保强制保存为字符串
function getGeminiKey() {
  return new Promise((resolve) => {
    const cached = localStorage.getItem('CRM_AI_KEY');
    // 增加判断：如果缓存的是旧的 Coze 对象格式，强制清除重新输入
    if (cached && !cached.includes('{')) { 
      resolve(cached); 
      return; 
    }

    document.getElementById('ai-key-ov')?.remove();
    const el = document.createElement('div');
    el.className = 'overlay';
    el.id = 'ai-key-ov';
    el.style.zIndex = '5000';
    el.innerHTML = `
      <div class="modal msm" style="max-width:380px">
        <div class="modal-header">
          <div class="modal-top">
            <div class="modal-title">🔍 配置 Kimi 情报引擎</div>
            <button class="modal-close" onclick="document.getElementById('ai-key-ov').remove();window._aiKeyResolve&&window._aiKeyResolve(null)">×</button>
          </div>
        </div>
        <div class="simple-body" style="padding:16px 24px 0">
          <div class="fg">
            <label class="fl">Kimi API Key (sk-开头)</label>
            <input id="ai-key-input" class="fi" type="password" placeholder="粘贴 sk- 开头的密钥..." style="letter-spacing:1px"/>
          </div>
          <div style="margin-top:10px; font-size:11px; color:var(--ts)">密钥将安全保存在您的浏览器本地。</div>
        </div>
        <div class="modal-footer">
          <button class="btn bp" style="width:100%" onclick="
            const v=document.getElementById('ai-key-input').value.trim();
            if(!v){alert('请输入 Key');return;}
            localStorage.setItem('CRM_AI_KEY', v); // 存入本地缓存
            document.getElementById('ai-key-ov').remove();
            window._aiKeyResolve&&window._aiKeyResolve(v);
          ">保存并开始背调</button>
        </div>
      </div>`;
    document.body.appendChild(el);
    window._aiKeyResolve = resolve;
  });
}

// 2. 核心调用逻辑：增加【自动抗 429 限制】的重试功能
async function callGemini(promptText, isJson = false) {
  const key = await getGeminiKey(); 
  if (!key) return null;
  
  showLoading(true);

  try {
    const res = await fetch('https://api.moonshot.cn/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: 'moonshot-v1-8k', 
        messages: [{ role: 'user', content: promptText }],
        temperature: 0.3,
        tools: [{"type": "builtin_function", "function": {"name": "$web_search"}}]
      })
    });

    // 客观拦截 429 状态码并阻断死循环
    if (res.status === 429) {
      throw new Error('API 并发超限 (429)。由于当前账户并发配额过低，请等待 1 分钟后再试，或在 Kimi 开放平台充值以解锁高并发额度。');
    }

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    showLoading(false);
    let text = data.choices?.[0]?.message?.content || '';

    if (isJson) {
      text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
      return JSON.parse(text);
    }
    return text;

  } catch (err) {
    showLoading(false);
    // 将错误信息直接输出到提示框，便于销售人员明确知道需要等待
    toast('⚠️ 终止: ' + err.message, 4000); 
    return null;
  }
}

function getNextDateByStep(logDate, stageNum) {
  if(!logDate) return null;
  if(stageNum === 1) return addD(logDate, 3);
  if(stageNum === 2) return addD(logDate, 4);
  if(stageNum === 3) return addD(logDate, 8);
  if(stageNum === 4) return addD(logDate, 15);
  return null;
}

async function saveLog(){
  const logDate=LFD.log_date||T();
  const c=ALL.find(x=>x.id===LID);if(!c)return;
  const advance=document.getElementById('advance-stage')?.checked!==false;
  
  let ns = c.follow_stage || 0;
  if (advance) {
    const selectedStage = SLABELS.indexOf(LFD.stage_label);
    if (selectedStage > 0) {
      ns = Math.max(ns, selectedStage); 
    } else {
      const currentLogs = LOGS.filter(l=>l.customer_id===LID);
      ns = Math.min(currentLogs.length+1, 5); 
    }
  }

  const finalNotes = LFD.notes?.trim() || '标记已跟进';
  const upd={last_follow_date:logDate, follow_stage:ns, last_log_note: finalNotes};
  if(ns===1 && !c.first_follow_date) upd.first_follow_date = logDate;

  upd.next_follow_date = LFD.next_date || null;
  if(LFD.status_update) upd.status=LFD.status_update;

  if (typeof showLoading === 'function') showLoading(true);
  await db.from('customers').update(upd).eq('id',LID);
  await db.from('follow_logs').insert([{customer_id:LID,sales:CU,stage_label:LFD.stage_label||SLABELS[ns]||'',notes:finalNotes,status_update:LFD.status_update||'',log_date:logDate,quality:LFD.quality||''}]);
  if (typeof showLoading === 'function') showLoading(false);

  toast('📝 日志已保存');LFD={stage_label:'',notes:'',status_update:'',log_date:T(),quality:'',next_date:''};
  await load();
  openLog(LID); 
}

async function editLog(logId){
  const log=LOGS.find(l=>l.id===logId);if(!log)return;
  const newNotes=prompt('修改沟通详情：',log.notes);if(newNotes===null)return;
  const curDate=log.log_date||log.created_at?.split('T')[0];
  const newDate=prompt('修改跟进日期（格式 2024-03-15）：',curDate);if(newDate===null)return;
  const fd=fixDate(newDate)||curDate;
  
  if (typeof showLoading === 'function') showLoading(true);
  await db.from('follow_logs').update({notes:newNotes.trim(),log_date:fd}).eq('id',logId);
  
  const {data: latest} = await db.from('follow_logs').select('notes').eq('customer_id', LID).order('log_date', {ascending: false}).order('created_at', {ascending: false}).limit(1);
  if(latest && latest.length > 0) {
    await db.from('customers').update({last_log_note: latest[0].notes}).eq('id', LID);
  }

  if (typeof showLoading === 'function') showLoading(false);
  
  toast('✅ 日志已更新');
  await load();
  openLog(LID);
}

async function deleteLog(logId){
  if(!confirm('⚠️ 确定删除这条跟进记录？（系统将触发历史状态回滚重算）'))return;
  
  if (typeof showLoading === 'function') showLoading(true);
  await db.from('follow_logs').delete().eq('id',logId);
  
  const remaining=LOGS.filter(l=>l.customer_id===LID&&l.id!==logId);
  const c=ALL.find(x=>x.id===LID);
  
  if(c){
    if(remaining.length===0){
       await db.from('customers').update({follow_stage:0, first_follow_date:null, last_follow_date:null, next_follow_date:null, last_log_note: null}).eq('id',LID);
    } else {
       const sorted = remaining.sort((a,b)=>(b.log_date||b.created_at)>(a.log_date||a.created_at)?1:-1);
       const latestLog = sorted[0];
       const latestDate = latestLog.log_date || latestLog.created_at?.split('T')[0];
       const oldestLog = sorted[sorted.length-1];
       const firstDate = oldestLog.log_date || oldestLog.created_at?.split('T')[0];
       
       let rollbackStage = SLABELS.indexOf(latestLog.stage_label);
       if (rollbackStage < 1) rollbackStage = Math.min(remaining.length, 5);
       
       const rolledBackNextDate = getNextDateByStep(latestDate, rollbackStage);
       
       await db.from('customers').update({
         follow_stage: rollbackStage,
         first_follow_date: firstDate,
         last_follow_date: latestDate,
         next_follow_date: rolledBackNextDate,
         last_log_note: latestLog.notes
       }).eq('id',LID);
    }
  }
  if (typeof showLoading === 'function') showLoading(false);
  toast('✅ 记录已删除，状态已重置回滚');
  await load();
  openLog(LID);
}

function batchExport(filtered){
  const ids=[...selIds];
  const list=ids.length>0?ALL.filter(c=>ids.includes(c.id)):filtered;
  if(!list.length){toast('没有可导出的数据');return;}
  const headers=['姓名','公司','官网','邮箱','电话','来源','国家','地区','负责销售','状态','评级','标签','包装物料','包装重量','包装速度','真空需求','自动化需求','客户类型','客户性质','预计购买','项目详情','备注','创建时间'];
  const fields=['name','company','website','email','phone','source','country','region','sales','status','rating','tags','packaging_material','packaging_weight','packaging_speed','vacuum_need','automation_need','customer_type','self_type','purchase_timeline','project_details','notes','custom_date'];
  const csvQ=v=>{const s=Array.isArray(v)?v.join(';'):String(v||'');return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:`${s}`};
  const rows=[headers.join(','),...list.map(c=>fields.map(f=>csvQ(c[f]||'')).join(','))];
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`佳龙客户_${T()}.csv`;a.click();
  toast(`✅ 已导出 ${list.length} 条`);
}

function switchFormTab(i){
  document.querySelectorAll('#form-tabs .tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  document.querySelectorAll('[id^="ft"]').forEach((p,j)=>p.classList.toggle('on',j===i));
}
function setFDRating(r){
  FD.rating=FD.rating===r?'':r;
  document.getElementById('rating-btns').querySelectorAll('.rs').forEach((b,i)=>{RATINGS.forEach(rr=>b.classList.remove('sel-'+rr));if(RATINGS[i]===FD.rating)b.classList.add('sel-'+RATINGS[i]);});
}
function toggleProd(p){
  if(FD.products.includes(p))FD.products=FD.products.filter(x=>x!==p);else FD.products.push(p);
  document.getElementById('ptags').innerHTML=PRODUCTS.map(pp=>`<button type="button" class="ptag ${FD.products.includes(pp)?'on':''}" onclick="toggleProd('${pp}')">${pp}</button>`).join('');
}
function addTagEdit(e){
  if(e.key==='Enter'){
    e.preventDefault();const val=e.target.value.trim();
    if(!val||FD.tags.includes(val))return;
    if(FD.tags.length >= 5) { toast('⚠️ 数据规范拦截：每位客户最多保留 5 个核心标签'); return; }
    FD.tags.push(val);e.target.value='';
    const wrap=document.getElementById('tags-wrap-edit');
    const chip=document.createElement('span');
    chip.style.cssText='display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--brand-l);color:var(--brand);border:1px solid rgba(0,102,204,.2)';
    chip.innerHTML=`${esc(val)}<span onclick="removeTagEdit('${esc(val)}', this)" style="cursor:pointer;opacity:.6;font-size:12px">×</span>`;
    wrap.insertBefore(chip,e.target);
  }
}
function removeTagEdit(tag, el){
  FD.tags = FD.tags.filter(t => t !== tag);
  if (el && el.parentElement) el.parentElement.remove();
}

async function saveCus(){
  if(!FD.name?.trim()){toast('⚠️ 请填写客户姓名');return;}
  const p={name:FD.name.trim(),job_title:FD.job_title||'',company:FD.company||'',email:FD.email||'',phone:FD.phone||'',source:FD.source||'',country:FD.country||'',region:FD.region||'',products:FD.products||[],packaging_material:FD.packaging_material||'',packaging_weight:FD.packaging_weight||'',packaging_speed:FD.packaging_speed||'',vacuum_need:FD.vacuum_need||'',automation_need:FD.automation_need||'',customer_type:FD.customer_type||'',self_type:FD.self_type||'',purchase_timeline:FD.purchase_timeline||'',project_details:FD.project_details||'',sales:FD.sales||CU,status:FD.status||'',custom_date:FD.custom_date||T(),first_record_date:FD.first_record_date||null,notes:FD.notes||'',rating:FD.rating||'',tags:FD.tags||[],website:FD.website||''};
  if(isDup({phone:p.phone, email:p.email}, EID) && !confirm('检测到重复客户（已存在相同的 电话 或 邮箱），是否继续保存？')) return;
  
  showLoading(true);
  const{error}=EID?await db.from('customers').update(p).eq('id',EID):await db.from('customers').insert([p]);
  showLoading(false);
  
  if(error){toast('失败:'+error.message);return;}
  toast(EID?'✅ 已更新':'✅ 添加成功');document.getElementById('form-ov')?.remove();await load();
}

function loadFile(inp){
  const f=inp.files[0];if(!f)return;document.getElementById('fn').textContent=f.name;
  const tryRead=(enc)=>{const r=new FileReader();r.onload=e=>{const txt=e.target.result;if(enc==='UTF-8'&&txt.includes('\uFFFD')){tryRead('GBK');}else{document.getElementById('imp-txt').value=txt;}};r.readAsText(f,enc);};tryRead('UTF-8');
}
function parseCSV(raw){
  const rows=[];let cur='',inQ=false,fields=[];
  for(let i=0;i<raw.length;i++){const ch=raw[i],nx=raw[i+1];if(ch==='"'){if(inQ&&nx==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}else if((ch==='\n'||ch==='\r')&&!inQ){if(ch==='\r'&&nx==='\n')i++;fields.push(cur.trim());cur='';if(fields.some(f=>f!==''))rows.push(fields);fields=[];}else{cur+=ch;}}
  if(cur||fields.length){fields.push(cur.trim());if(fields.some(f=>f!==''))rows.push(fields);}
  return rows;
}
function fixDate(s){
  if(!s) return null;
  const s2 = s.replace(/\//g, '-').trim();
  let m = s2.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = s2.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if(m) {
    const p1 = parseInt(m[1]), p2 = parseInt(m[2]);
    const mo = p1 > 12 ? p2 : p1;
    const da = p1 > 12 ? p1 : p2;
    return `${m[3]}-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`;
  }
  return null;
}

async function doImp(){
  const raw=document.getElementById('imp-txt')?.value;if(!raw?.trim()){toast('请粘贴 CSV 数据');return;}
  const rows=parseCSV(raw);if(rows.length<2){toast('至少需要表头+一行数据');return;}
  const headers=rows[0].map(h=>h.replace(/^\uFEFF/,'').trim());

  const map={姓名:'name',职位:'job_title',公司:'company',官网:'website',邮箱:'email',电话:'phone',来源:'source',国家:'country',地区:'region',负责销售:'sales',状态:'status',包装物料:'packaging_material',包装重量:'packaging_weight',包装速度:'packaging_speed',真空需求:'vacuum_need',自动化需求:'automation_need',客户类型:'customer_type',客户性质:'self_type',预计购买:'purchase_timeline',项目详情:'project_details',备注:'notes',创建时间:'custom_date'};
  
  const data=[];
  for(let i=1;i<rows.length;i++){
    const vals=rows[i];
    const obj={products:[],tags:[],rating:''};
    headers.forEach((h,j)=>{if(map[h])obj[map[h]]=(vals[j]||'').trim();});
    if(!obj.name)continue;
    if(!obj.sales)obj.sales=CU;
    obj.custom_date=fixDate(obj.custom_date)||T();
    data.push(obj);
  }
  
  if(!data.length){toast('没有有效数据行');return;}
  let total=0;
  for(let i=0;i<data.length;i+=50){
    const batch=data.slice(i,i+50);
    const{error}=await db.from('customers').insert(batch);
    if(error){toast(`导入失败(第${i+1}行起): ${error.message}`);return;}
    total+=batch.length;
  }
  toast(`✅ 成功导入 ${total} 条`);
  document.getElementById('imp-ov')?.remove();
  await load();
}

function renderFbAdsChart(){
  if(!document.getElementById('fbLineChart')) return;
  const rDate = getDateRange(fAdsRange, fAdsDateStart, fAdsDateEnd);
  let src = fAdsRange === 'all' ? FB_ADS : FB_ADS.filter(d => d.record_date >= rDate.s && d.record_date <= rDate.e);
  if(fAdsCamp !== '全部') src = src.filter(d => d.campaign_name === fAdsCamp);
  if(fAdsAdset !== '全部') src = src.filter(d => d.adset_name === fAdsAdset);
  if(fAdsAd !== '全部') src = src.filter(d => d.ad_name === fAdsAd);
  if(fAdsCountry !== '全部') src = src.filter(d => getCoName(d.country) === fAdsCountry);

  ['fbLineChart', 'fbScatterChart'].forEach(id => { if(CI[id]) { CI[id].destroy(); delete CI[id]; } });

  const daysMap = {};
  src.forEach(d => {
    if(!daysMap[d.record_date]) daysMap[d.record_date] = { spend:0, leads:0 };
    daysMap[d.record_date].spend += Number(d.spend||0);
    daysMap[d.record_date].leads += Number(d.leads||0);
  });
  const days = Object.keys(daysMap).sort();
  
  CI['fbLineChart'] = new Chart(document.getElementById('fbLineChart'), {
    type: 'line',
    data: {
      labels: days.map(fmt),
      datasets: [
        { label: '花费 (USD)', data: days.map(d=>daysMap[d].spend), borderColor: '#FF3B30', backgroundColor: '#FF3B30', yAxisID: 'y', tension:0.3 },
        { label: '转化数', data: days.map(d=>daysMap[d].leads), borderColor: '#34C759', backgroundColor: '#34C759', yAxisID: 'y1', tension:0.3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: { type: 'linear', display: true, position: 'left', grid: { color: 'rgba(0,0,0,.04)' } },
        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
      }
    }
  });

  const adMap = {};
  src.forEach(d => {
    const key = getCoName(d.country);
    if(!adMap[key]) adMap[key] = { spend:0, leads:0, country:key };
    adMap[key].spend += d.spend;
    adMap[key].leads += d.leads;
  });
  const scatterData = Object.values(adMap).filter(d=>d.spend > 5).map(d => ({
    x: d.spend, 
    y: d.leads > 0 ? d.spend/d.leads : d.spend,
    country: d.country,
    leads: d.leads
  }));

  if (scatterData.length > 0 && window.Chart) {
    CI['fbScatterChart'] = new Chart(document.getElementById('fbScatterChart'), {
      type: 'scatter',
      data: {
        datasets: [{
          label: '区域表现节点',
          data: scatterData,
          backgroundColor: ctx => {
            const v = ctx.raw;
            if(!v) return 'var(--brand)';
            if(v.y > 30 || v.leads === 0) return 'rgba(255,59,48,0.8)'; 
            if(v.y < 10 && v.leads > 0) return 'rgba(52,199,89,0.8)'; 
            return 'rgba(0,102,204,0.6)'; 
          },
          pointRadius: 6,
          pointHoverRadius: 8
        }]
      },
      options: { 
        responsive: true, maintainAspectRatio: false, 
        plugins: { 
          tooltip: { callbacks: { label: (ctx) => `${ctx.raw.country}: 花费 $${ctx.raw.x.toFixed(2)}, CPL $${ctx.raw.y.toFixed(2)}` } },
          legend: { display: false }
        },
        scales: { 
          x: { title: {display:true, text:'总花费 (USD)', color:'var(--ts)', font:{size:10}}, grid: { color: 'rgba(0,0,0,.04)' } }, 
          y: { title: {display:true, text:'单条转化成本 (USD)', color:'var(--ts)', font:{size:10}}, grid: { color: 'rgba(0,0,0,.04)' } } 
        } 
      }
    });
  }

function openFbImport(){
  document.getElementById('fb-imp-ov')?.remove();
  const el=document.createElement('div');el.className='overlay';el.id='fb-imp-ov';
  el.innerHTML=`<div class="modal mlg"><div class="modal-header"><div class="modal-top"><div class="modal-title">📥 导入底层流水数据</div><button class="modal-close" onclick="document.getElementById('fb-imp-ov').remove()">×</button></div></div>
  <div class="simple-body">
    <p style="font-size:13px;color:var(--ts);margin-bottom:12px">请直接将包含【国家/地区】细分维度的原生流水报表内容粘贴至下方。系统将自动执行清洗容错、合并指标计算，并以增量覆盖方式安全写入底层金库。</p>
    <div class="fg"><textarea class="fi" id="fb-imp-txt" rows="10" placeholder="在此粘贴 CSV 数据内容..."></textarea></div>
    <div style="display:flex;gap:10px;align-items:center"><label style="padding:7px 13px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--surface2);color:var(--ts)">📁 选择 CSV 文件 <input type="file" accept=".csv" style="display:none" onchange="loadFbFile(this)"/></label><span id="fb-fn" style="font-size:12px;color:var(--tt)"></span></div>
  </div>
  <div class="modal-footer"><button class="btn bg" onclick="document.getElementById('fb-imp-ov').remove()">取消</button><button class="btn bp" onclick="doFbImp()">🚀 执行清洗并入库</button></div>
  </div>`;
  document.body.appendChild(el);el.addEventListener('click',e=>{if(e.target===el)el.remove()});
}

function loadFbFile(inp){
  const f=inp.files[0];if(!f)return;document.getElementById('fb-fn').textContent=f.name;
  const tryRead=(enc)=>{const r=new FileReader();r.onload=e=>{const txt=e.target.result;if(enc==='UTF-8'&&txt.includes('\uFFFD')){tryRead('GBK');}else{document.getElementById('fb-imp-txt').value=txt;}};r.readAsText(f,enc);};tryRead('UTF-8');
}

async function doFbImp(){
  const raw = document.getElementById('fb-imp-txt')?.value; if(!raw?.trim()){toast('请先粘贴或选择文件');return;}
  const rows = parseCSV(raw); if(rows.length < 2){toast('无有效数据行');return;}
  
  const headers = rows[0].map(h=>h.replace(/^\uFEFF/,'').trim());
  const getIdx = (name) => headers.findIndex(h => h.includes(name));
  
  const iDate = getIdx('报告开始日期');
  const iCamp = getIdx('广告系列名称');
  const iAdset = getIdx('广告组名称');
  const iAd = getIdx('广告名称');
  const iCountry = getIdx('国家/地区');
  const iSpend = getIdx('已花费金额');
  const iImp = getIdx('展示次数');
  const iClick = getIdx('链接点击量');
  const iLead1 = getIdx('潜在客户');
  const iReach = getIdx('覆盖人数');
  const iFreq = getIdx('频次');

  if(iDate===-1 || iCountry===-1 || iSpend===-1) { toast('⚠️ 缺少必要列（日期 / 国家 / 花费）'); return; }

  const data = [];
  for(let i=1; i<rows.length; i++){
    const r = rows[i];
    if(!r[iDate] || r[iDate].includes('总计')) continue; 
    
    const leadsCount = iLead1 !== -1 ? (parseFloat(r[iLead1])||0) : 0;
    
    data.push({
      record_date: fixDate(r[iDate]),
      campaign_name: r[iCamp] ? r[iCamp].trim() : '-',
      adset_name: r[iAdset] ? r[iAdset].trim() : '-',
      ad_name: r[iAd] ? r[iAd].trim() : '-',
      country: r[iCountry] ? r[iCountry].trim() : 'Unknown',
      spend: parseFloat(r[iSpend]) || 0,
      impressions: parseInt(r[iImp]) || 0,
      link_clicks: parseInt(r[iClick]) || 0,
      leads: leadsCount,
      reach: iReach !== -1 ? (parseInt(r[iReach]) || 0) : 0,
      frequency: iFreq !== -1 ? (parseFloat(r[iFreq]) || 0) : 0
    });
  }

  if(!data.length){toast('没有可导入的数据行');return;}
  
  showLoading(true);
  let total = 0;
  for(let i=0; i<data.length; i+=100){
    const batch = data.slice(i, i+100);
    const {error} = await db.from('fb_ads_metrics').upsert(batch, {onConflict: 'record_date,campaign_name,adset_name,ad_name,country'});
    if(error){ toast(`写入失败: ${error.message}`); showLoading(false); return; }
    total += batch.length;
  }
  showLoading(false);
  toast(`✅ 导入完成，共 ${total} 条`);
  document.getElementById('fb-imp-ov')?.remove();
  await load();
}

function buildFbExportLines() {
  const rDate = getDateRange(fAdsRange, fAdsDateStart, fAdsDateEnd);
  let src = fAdsRange === 'all' ? FB_ADS : FB_ADS.filter(d => d.record_date >= rDate.s && d.record_date <= rDate.e);
  if(fAdsCamp !== '全部') src = src.filter(d => d.campaign_name === fAdsCamp);
  if(fAdsAdset !== '全部') src = src.filter(d => d.adset_name === fAdsAdset);
  if(fAdsAd !== '全部') src = src.filter(d => d.ad_name === fAdsAd);
  if(fAdsCountry !== '全部') src = src.filter(d => getCoName(d.country) === fAdsCountry);
  if(!src.length) return null;

  const ctx = "背景：佳龙包装 Facebook广告数据 | B2B工业机器 | 目标：降低CPL、找到高质量受众、排查受众疲劳(频次)\n\n";
  const headers = ['日期','国家','广告系列','广告组','广告名称','花费(USD)','展示','覆盖人数','频次','点击','CTR(%)','转化数','表单转化率(%)','CPL','CPC','CPM','健康度预警'];
  const lines = [headers.join(',')];
  src.forEach(d => {
    const cpl = d.leads > 0 ? (d.spend/d.leads).toFixed(2) : 0;
    const cpc = d.link_clicks > 0 ? (d.spend/d.link_clicks).toFixed(2) : 0;
    const cpm = d.impressions > 0 ? ((d.spend/d.impressions)*1000).toFixed(2) : 0;
    const leadRate = d.link_clicks > 0 ? ((d.leads/d.link_clicks)*100).toFixed(1) : 0;
    const warning = d.frequency >= 3.5 ? '频率过高-换素材' : d.frequency >= 2.5 ? '注意频率' : (d.leads === 0 && d.spend > 5 ? '零转化-纯消耗' : '正常');
    lines.push(`${d.record_date},${getCoName(d.country)},"${d.campaign_name}","${d.adset_name}","${d.ad_name}",${d.spend},${d.impressions},${d.reach||0},${d.frequency||0},${d.link_clicks},${d.ctr||0},${d.leads},${leadRate},${cpl},${cpc},${cpm},${warning}`);
  });
  return ctx + lines.join('\n');
}

function exportCoreData() {
  const str = buildFbExportLines();
  if(!str){toast('当前视图区无数据');return;}
  navigator.clipboard.writeText(str)
    .then(()=>toast('✅ 已复制到剪贴板'))
    .catch(()=>downloadCoreData());
}

function downloadCoreData() {
  const str = buildFbExportLines();
  if(!str){toast('暂无数据');return;}
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+str],{type:'text/csv;charset=utf-8'}));
  a.download = `FB_数据_${T()}.csv`;
  a.click();
  toast('✅ 已下载');
}
function showAIResultModal(text, c) {
  document.getElementById('ai-result-ov')?.remove();
  const el = document.createElement('div');
  el.className = 'overlay';
  el.id = 'ai-result-ov';
  el.innerHTML = `
    <div class="modal mlg">
      <div class="modal-header">
        <div class="modal-top">
          <div class="modal-title">✨ AI 生成话术 — ${esc(c.name)}</div>
          <button class="modal-close" onclick="document.getElementById('ai-result-ov').remove()">×</button>
        </div>
      </div>
      <div class="simple-body" style="white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--tp);background:var(--surface2);border-radius:var(--r);padding:16px;margin:0 24px 16px;">
${esc(text)}
      </div>
      <div class="modal-footer">
        <button class="btn bg" onclick="navigator.clipboard.writeText(${JSON.stringify(text)});toast('📋 已复制到剪贴板')">📋 复制话术</button>
        <button class="btn bp" onclick="document.getElementById('ai-result-ov').remove()">关闭</button>
      </div>
    </div>`;

// ================================================
// AI 批量打分
// ================================================
let isScoring = false;
let cancelScoring = false;

window.showAiReasonModal = function(btn) {
  const score = Number(btn.getAttribute('data-score'));
  const reason = btn.getAttribute('data-reason');
  
  document.getElementById('ai-reason-ov')?.remove();
  const el = document.createElement('div');
  el.className = 'overlay';
  el.id = 'ai-reason-ov';
  el.style.zIndex = '4000'; 

  let colorVar = 'ts'; let icon = '⚪'; let title = '低意向线索 (C/D级)';
  if (score >= 80) { colorVar = 'danger'; icon = '🔥'; title = '极高优客户 (S级)'; }
  else if (score >= 60) { colorVar = 'success'; icon = '🟢'; title = '优质客户 (A级)'; }
  else if (score >= 40) { colorVar = 'warn'; icon = '🟡'; title = '普通客户 (B级)'; }

  el.innerHTML = `
    <div class="modal msm" style="max-width:340px; box-shadow:0 20px 60px rgba(0,0,0,0.15);">
      <div class="modal-header" style="border-bottom:none; padding-bottom:10px;">
        <div class="modal-top" style="margin-bottom:0">
          <div class="modal-title" style="display:flex; align-items:center; gap:10px;">
            <span style="font-size:28px; font-weight:800; color:var(--${colorVar}); line-height:1">${icon} ${score}</span>
            <span style="font-size:13px; font-weight:600; color:var(--tp); margin-top:8px">${title}</span>
          </div>
          <button class="modal-close" onclick="document.getElementById('ai-reason-ov').remove()">×</button>
        </div>
      </div>
      <div class="simple-body" style="padding:0 24px 24px;">
        <div style="font-size:11px; font-weight:700; color:var(--tt); margin-bottom:8px; letter-spacing:0.5px">🤖 AI 判定理由</div>
        <div style="font-size:13px; color:var(--tp); line-height:1.6; background:var(--surface2); padding:14px; border-radius:var(--r2); border:1px solid var(--border-l);">
          ${reason}
        </div>
      </div>
    </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target === el) el.remove() });
};

function renderAiScore(score, reason) {
  if (score === null || score === undefined) return '';
  let cls = 'ai-score-C'; let icon = '⚪';
  if (score >= 80) { cls = 'ai-score-S'; icon = '🔥'; }
  else if (score >= 60) { cls = 'ai-score-A'; icon = '🟢'; }
  else if (score >= 40) { cls = 'ai-score-B'; icon = '🟡'; }
  
  const safeReason = esc(reason || '暂无数据');
  return `<span class="ai-score-badge ${cls}" 
                data-score="${score}"
                data-reason="${safeReason}"
                onclick="event.stopPropagation(); showAiReasonModal(this)">
            ${icon} ${score}分
          </span>`;
}

function openBatchScoreModal() {
  const targets = ALL.filter(c => c.ai_score === null && !['垃圾', '流失'].includes(c.status));
  if (targets.length === 0) { toast('🎉 太棒了，当前没有需要打分的客户！'); return; }

  document.getElementById('ai-score-ov')?.remove();
  const el = document.createElement('div');
  el.className = 'overlay'; el.id = 'ai-score-ov'; el.style.zIndex = '3000';
  el.innerHTML = `
    <div class="modal msm">
      <div class="modal-header">
        <div class="modal-top">
          <div class="modal-title">🤖 AI 全量智能质检打分</div>
          <button class="modal-close" onclick="cancelScoring=true; document.getElementById('ai-score-ov').remove()">×</button>
        </div>
      </div>
      <div class="simple-body" style="text-align:center; padding: 24px;">
        <div style="font-size:13px; color:var(--ts); margin-bottom:16px;">
          检测到 <b style="color:var(--brand)">${targets.length}</b> 个未评分客户。<br>
          AI 将根据 FB 表单的单选项（物料/重量/速度）以及邮箱类型，自动评估其购买意向 (0-100分)。
        </div>
        <div style="background:var(--surface2); border-radius:10px; padding:16px; margin-bottom:16px;">
          <div style="font-size:24px; font-weight:700; color:var(--brand); font-family:monospace;" id="score-progress-text">0 / ${targets.length}</div>
          <div style="height:8px; background:var(--border-l); border-radius:4px; margin-top:10px; overflow:hidden;">
            <div id="score-progress-bar" style="height:100%; width:0%; background:var(--brand); transition:width .3s;"></div>
          </div>
          <div id="score-status-text" style="font-size:11px; color:var(--tt); margin-top:8px;">等待开始...</div>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn bg" onclick="cancelScoring=true; document.getElementById('ai-score-ov').remove()">关闭</button>
        <button class="btn bp" id="start-score-btn" onclick="executeBatchScore()">🚀 开始打分 (断点续传)</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

async function executeBatchScore() {
  if (isScoring) return;
  const btn = document.getElementById('start-score-btn');
  btn.disabled = true; btn.textContent = '⏸ 运行中...';
  isScoring = true; cancelScoring = false;

  let targets = ALL.filter(c => c.ai_score === null && !['垃圾', '流失'].includes(c.status));
  let total = targets.length;
  let done = 0;

  const statusText = document.getElementById('score-status-text');
  
  for (let i = 0; i < total; i += 10) {
    if (cancelScoring) { statusText.textContent = '⚠️ 已暂停'; break; }
    
    const batch = targets.slice(i, i + 10);
    statusText.textContent = `⏳ 正在请求 Kimi 大模型分析第 ${i+1} 到 ${i+batch.length} 条...`;
    
    // ==========================================
    // 前端风控系统
    // ==========================================
    const batchData = batch.map(c => {
      let riskLabel = "";
      
      if (c.phone) {
        const cleanPhone = c.phone.replace(/[^0-9+]/g, '');
        if (!cleanPhone.includes('+') && cleanPhone.length < 8) {
          riskLabel += "[风控警告：无国际区号且号码过短，极难加到WhatsApp] ";
        } else if (cleanPhone.length < 6) {
          riskLabel += "[风控警告：电话号码位数严重不足，判定为假号码] ";
        }
      } else {
        riskLabel += "[风控警告：未留电话，无法即时通讯] ";
      }

      if (c.email) {
        const em = c.email.toLowerCase();
        if (em.includes('@gamil.com') || em.includes('@yaho.com') || em.includes('test@') || em.includes('123@')) {
          riskLabel += "[风控警告：极其明显的拼写错误或测试假邮箱] ";
        }
      }

      return {
        id: c.id,
        email: c.email,
        phone: c.phone,
        country: c.country,
        source: c.source,
        customer_type: c.customer_type,
        self_type: c.self_type, 
        automation_need: c.automation_need,
        purchase_timeline: c.purchase_timeline,
        packaging_material: c.packaging_material,
        packaging_weight: c.packaging_weight,
        packaging_speed: c.packaging_speed,
        project_details: c.project_details,
        risk_system_warning: riskLabel
      };
    });

    const prompt = `你是佳龙包装机械的资深外贸销售总监，正在评估系统里的线索质量（0-100分）。
注意：客户填写的参数多为英文（如 farm, feed, 25kg, within 1 month），请准确识别其商业价值。
请严格按照以下 4 个维度累计加分（总分100分）：

1. 🎯 需求与紧迫性 (最高 40分)
 - 明确提供了【物料、重量、速度、自动化】中至少2项具体参数：加 20 分。全填"待确认/无"得 0 分。
 - purchase_timeline(预计购买)：如果是 "within 1 month" 或 "ASAP" 等近期急需的，直接额外加 20 分！如果是 3-6个月 加 10 分。未知 0 分。

2. 🏢 客户身份资质 (最高 30分)
 - customer_type 或 self_type 包含 意向代理, farm, factory, end-user, dealer, manufacturer 等高价值实体性质：加 15 分。
 - 邮箱是企业专属域名（非gmail/yahoo等免费邮箱）：加 15 分。如果是免费邮箱但有全名：加 5 分。

3. 📞 触达通道质量与风控 (最高 20分) —— ⚠️ 重点看 risk_system_warning 字段！
 - 如果 risk_system_warning 提示"假号码"或"假邮箱"，该项直接 0 分，且总分额外扣 20 分！
 - 如果没有风控警告，且留下了带有国际区号的完整电话号码（可加WhatsApp）：加 15 分。
 - 邮箱正常可用：加 5 分。

4. 🌍 市场与来源 (最高 10分)
 - 来源是"官网"或"高质量展会"：加 5 分。
 - 国家属于包装机械高需求市场（如南亚、东南亚、非洲、南美、中东等发展中国家）：加 5 分。

如果 job_title 包含 CEO/Director/Manager/Owner 等决策者头衔，额外加 10 分！

请严格返回纯 JSON 数组格式（禁止使用 \`\`\`json 等 Markdown 代码块符号），格式如下：
[{"id": "客户id", "ai_score": 90, "ai_score_reason": "参数齐全急买(+40) Farm实体(+15) 触达通道畅通(+15) 南亚市场(+5)"}]

待打分客户数组：
${JSON.stringify(batchData)}`;

    const res = await callGemini(prompt, true);
    
    if (res && Array.isArray(res)) {
      statusText.textContent = `💾 正在写入数据库...`;
      for (let r of res) {
        if (!r.id || r.ai_score === undefined) continue;
        await db.from('customers').update({ ai_score: r.ai_score, ai_score_reason: r.ai_score_reason }).eq('id', r.id);
        let localCus = ALL.find(x => x.id === r.id);
        if (localCus) {
          localCus.ai_score = r.ai_score;
          localCus.ai_score_reason = r.ai_score_reason;
        }
      }
    } else {
      await new Promise(resolve => setTimeout(resolve, 2000));
    }

    done += batch.length;
    document.getElementById('score-progress-text').textContent = `${done} / ${total}`;
    document.getElementById('score-progress-bar').style.width = `${Math.round(done/total*100)}%`;
  }

  isScoring = false;
  btn.disabled = false; btn.textContent = done >= total ? '✅ 全部完成' : '▶️ 继续打分';
  if (done >= total) {
    statusText.textContent = '🎉 历史客户打分已全部完成！';
    toast('✅ 打分完成，列表已刷新');
    render(); 
  }
}
</script>
